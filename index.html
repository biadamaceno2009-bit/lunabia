<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LunaBia Pro Lux</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --eucalipto: #2d3d36; 
            --glass-bg: rgba(255, 255, 255, 0.03); 
            --border: rgba(255, 255, 255, 0.15); 
        }
        
        body { margin: 0; min-height: 100vh; font-family: 'Montserrat', sans-serif; background-image: url('1.jpeg'); background-size: cover; background-position: center; background-attachment: fixed; display: flex; justify-content: center; padding: 40px 15px; box-sizing: border-box; overflow-x: hidden; }
        
        .ilha-mae { 
            background: rgba(255, 255, 255, 0.01); 
            backdrop-filter: blur(50px) saturate(180%); 
            width: 100%; 
            max-width: 380px; 
            border-radius: 70px; 
            padding: 60px 15px; 
            border: 1px solid var(--border); 
            text-align: center; 
            box-shadow: 0 50px 100px rgba(0,0,0,0.6); 
        }

        h1 { font-family: 'Cinzel', serif; color: var(--eucalipto) !important; font-size: 48px; margin: 0; letter-spacing: 6px; }
        h3 { font-size: 11px; text-transform: uppercase; letter-spacing: 3px; color: var(--eucalipto) !important; font-weight: 800; margin-bottom: 20px; }
        
        /* ILHA DA LUA REALISTA (SISTEMA DE LUZ E SOMBRA) */
        .ilha-lua { background: var(--glass-bg); border-radius: 35px; padding: 25px; margin: 0 auto 40px; width: fit-content; border: 1px solid var(--border); box-shadow: 0 15px 30px rgba(0,0,0,0.3); display: flex; flex-direction: column; align-items: center; }
        
        .lua-esfera {
            width: 70px; height: 70px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #e0e0e0, #888 30%, #333 70%, #000 100%);
            position: relative;
            box-shadow: 0 0 15px rgba(255,255,255,0.1), inset -5px -5px 15px rgba(0,0,0,0.5);
            overflow: hidden;
        }

        /* Sombra que faz a fase da lua */
        .lua-sombra-orbital {
            position: absolute;
            width: 100%; height: 100%;
            background: rgba(10, 15, 10, 0.9);
            border-radius: 50%;
            transition: transform 0.6s ease-in-out, left 0.6s ease-in-out;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.8);
        }

        #lua-nome { font-size: 9px; text-transform: uppercase; letter-spacing: 2px; color: var(--eucalipto); font-weight: 700; margin-top: 15px; }
        
        .ilha-filha { 
            background: rgba(255, 255, 255, 0.02); 
            border-radius: 45px; 
            padding: 28px 20px; 
            margin-bottom: 35px; 
            border: 1px solid var(--border); 
            box-shadow: 0 20px 40px rgba(0,0,0,0.4), inset 0 2px 2px rgba(255,255,255,0.05); 
        }

        /* BOTÕES COM PROFUNDIDADE E NÚMEROS VERDES */
        .btn-gv { 
            background: rgba(255, 255, 255, 0.08); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            color: var(--eucalipto); 
            cursor: pointer; 
            border-radius: 50%; 
            width: 44px; height: 44px; 
            font-weight: 800; font-size: 14px; 
            margin: 5px;
            transition: all 0.2s; 
            box-shadow: 5px 5px 10px rgba(0,0,0,0.4), 
                        -2px -2px 5px rgba(255,255,255,0.05),
                        inset 1px 1px 2px rgba(255,255,255,0.1); 
        }
        
        .btn-gv:active, .active { 
            background: var(--eucalipto) !important; 
            color: white !important; 
            transform: translateY(3px); 
            box-shadow: inset 4px 4px 8px rgba(0,0,0,0.6); 
        }
        
        /* SINTOMAS VERDES COM ÍCONE BRANCO */
        .grid-sintomas { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
        .container-sintoma { display: flex; flex-direction: column; align-items: center; cursor: pointer; }
        .btn-icone-bia { 
            width: 46px; height: 46px; 
            background: var(--eucalipto); 
            border: 1px solid var(--border); 
            border-radius: 14px; 
            display: flex; align-items: center; justify-content: center; 
            box-shadow: 4px 4px 8px rgba(0,0,0,0.4), inset 1px 1px 2px rgba(255,255,255,0.2); 
        }
        .btn-icone-bia img { width: 26px; filter: brightness(0) invert(1); }
        .label-sintoma { font-size: 7px; color: white; margin-top: 5px; font-weight: 600; text-transform: uppercase; }
        .active-icon .btn-icone-bia { background: #5a7569 !important; box-shadow: inset 3px 3px 6px rgba(0,0,0,0.5); }

        textarea, input[type="date"] { 
            width: 100%; box-sizing: border-box; 
            background: rgba(255,255,255,0.05); 
            border: 1px solid var(--border); 
            border-radius: 25px; padding: 20px; 
            color: var(--eucalipto); font-weight: 700; 
            outline: none; 
        }

        .btn-salvar { 
            width: 100%; padding: 24px; border-radius: 40px; 
            color: white; font-weight: 800; text-transform: uppercase; 
            background: var(--eucalipto); 
            box-shadow: 0 10px 20px rgba(0,0,0,0.4), inset 0 2px 2px rgba(255,255,255,0.2); 
        }
    </style>
</head>
<body>

<div class="ilha-mae">
    <h1>LunaBia</h1>
    
    <div class="ilha-lua">
        <div class="lua-esfera">
            <div id="lua-sombra" class="lua-sombra-orbital"></div>
        </div>
        <div id="lua-nome">Carregando...</div>
    </div>
    
    <div class="ilha-filha"><h3>📅 Registro</h3><input type="date" id="data-input" onchange="mudarData()"></div>
    <div id="area-escalas"></div>

    <div class="ilha-filha">
        <h3>🩺 Sintomas</h3>
        <div class="grid-sintomas">
            <div class="container-sintoma" data-sintoma="Cólica" onclick="toggleIcon(this)"><div class="btn-icone-bia">🩸</div><div class="label-sintoma">Cólica</div></div>
            <div class="container-sintoma" data-sintoma="Estresse" onclick="toggleIcon(this)"><div class="btn-icone-bia">⚡</div><div class="label-sintoma">Estresse</div></div>
        </div>
    </div>

    <button class="btn-salvar" onclick="salvarDados()">Salvar Registro</button>
</div>

<script>
    const escalas = ["Sono", "Humor", "Energia", "Descanso"];
    escalas.forEach(n => {
        const d = document.createElement('div'); d.className = 'ilha-filha';
        d.innerHTML = `<h3>${n}</h3><div class="btns-row" data-n="${n}" style="display:flex; justify-content:center;"></div>`;
        const r = d.querySelector('.btns-row');
        for(let i=1; i<=5; i++) {
            const b = document.createElement('button'); b.className = 'btn-gv'; b.innerText = i;
            b.onclick = function() { r.querySelectorAll('button').forEach(x => x.classList.remove('active')); this.classList.add('active'); };
            r.appendChild(b);
        }
        document.getElementById('area-escalas').appendChild(d);
    });

    function toggleIcon(el) { el.classList.toggle('active-icon'); }

    function atualizarLuaEsferica(dataStr) {
        const data = new Date(dataStr + "T12:00:00");
        const dia = data.getDate(); const mes = data.getMonth() + 1; let ano = data.getFullYear();
        if (mes < 3) { ano--; mes += 12; }
        let c = 365.25 * ano; let e = 30.6 * (mes + 1);
        let jd = c + e + dia - 694039.09; jd /= 29.5305882;
        let b = parseInt(jd); jd -= b;
        
        const sombra = document.getElementById('lua-sombra');
        const nome = document.getElementById('lua-nome');
        
        // Movimento da sombra orbital (0 a 100%)
        let fase = jd * 100;
        
        if (fase <= 50) {
            // Crescente: a sombra sai da direita para a esquerda
            sombra.style.left = (fase * 2) + "%";
            nome.innerText = "Lua Crescente";
        } else {
            // Minguante: a sombra volta a cobrir
            sombra.style.left = "-" + (100 - (fase - 50) * 2) + "%";
            nome.innerText = "Lua Minguante";
        }
        
        if (fase > 46 && fase < 54) nome.innerText = "Lua Cheia";
        if (fase < 4 || fase > 96) nome.innerText = "Lua Nova";
    }

    function mudarData() {
        const data = document.getElementById('data-input').value;
        atualizarLuaEsferica(data);
    }

    const hoje = new Date().toISOString().split('T')[0];
    document.getElementById('data-input').value = hoje;
    atualizarLuaEsferica(hoje);
</script>
</body>
</html>
