<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LunaBia - Oficial</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --terracota-grad: linear-gradient(135deg, #b87355, #804832);
            --glass-mae: rgba(255, 255, 255, 0.1);
            --glass-filha: rgba(255, 255, 255, 0.05);
            --text-brown: #633624;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
            background-image: url('papeldeparede.png'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-color: #f4ece6;
            display: flex;
            justify-content: center;
            padding: 20px 10px;
        }

        .container {
            background: var(--glass-mae);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            width: 100%;
            max-width: 500px;
            border-radius: 40px;
            padding: 30px 20px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.15);
            text-align: center;
        }

        /* LOGO AJUSTADA */
        h1 { 
            font-family: 'Great Vibes', cursive; 
            color: #804832; 
            font-size: 65px; 
            margin: 0 0 20px 0;
            text-shadow: 1px 1px 4px rgba(255,255,255,0.6);
        }

        .card {
            background: var(--glass-filha);
            backdrop-filter: blur(5px);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }

        h3 { color: var(--text-brown); text-transform: uppercase; font-size: 13px; margin-bottom: 15px; letter-spacing: 1.5px; font-weight: 700; }

        .grid-layout { display: grid; gap: 8px; justify-content: center; }
        .grid-7 { grid-template-columns: repeat(7, 1fr); }
        .grid-5 { grid-template-columns: repeat(5, 1fr); }

        .btn-opt {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            width: 38px; height: 38px;
            cursor: pointer;
            color: #4a3728;
            font-weight: 600;
        }

        .active { background: var(--terracota-grad) !important; color: white !important; border: none; transform: scale(1.1); }

        textarea, input[type="date"] {
            width: 100%; box-sizing: border-box; background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.5); border-radius: 15px; padding: 12px;
            color: #4a3728; font-family: inherit;
        }

        /* BOTÕES FINAIS */
        .action-row { display: flex; gap: 15px; margin-top: 10px; }
        
        .btn-action {
            flex: 1; padding: 18px; border-radius: 20px; border: none; color: white;
            font-weight: bold; font-size: 14px; cursor: pointer; text-transform: uppercase;
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
        }

        .btn-save { background: var(--terracota-grad); }
        .btn-report { background: linear-gradient(135deg, #9bb89d, #7a9d7e); }
    </style>
</head>
<body>

<div class="container">
    <h1>LunaBia</h1>

    <div class="card">
        <h3>Registro Diário</h3>
        <input type="date" id="data">
    </div>

    <div class="card">
        <h3>Leitura Bíblica</h3>
        <div class="grid-layout grid-7" id="biblia"></div>
    </div>

    <div class="card">
        <h3>Versículo do Dia</h3>
        <textarea rows="3" placeholder="Qual palavra o Senhor te deu hoje?"></textarea>
    </div>

    <div id="escalas-area"></div>

    <div class="card">
        <h3>Diário</h3>
        <textarea rows="4" placeholder="Escreva aqui..."></textarea>
    </div>

    <div class="action-row">
        <button class="btn-action btn-save">SALVAR</button>
        <button class="btn-action btn-report">RELATÓRIO</button>
    </div>
</div>

<script>
    // Bíblia
    const b = document.getElementById('biblia');
    for(let i=1; i<=31; i++){
        const btn = document.createElement('button');
        btn.className = 'btn-opt';
        btn.innerText = i;
        btn.onclick = () => btn.classList.toggle('active');
        b.appendChild(btn);
    }

    // Escalas
    const esc = ["Sono", "Humor", "Cansaço", "Descanso", "Energia"];
    const area = document.getElementById('escalas-area');
    esc.forEach(t => {
        const div = document.createElement('div');
        div.className = 'card';
        div.innerHTML = `<h3>${t}</h3>`;
        const grid = document.createElement('div');
        grid.className = 'grid-layout grid-5';
        for(let i=1; i<=5; i++){
            const btn = document.createElement('button');
            btn.className = 'btn-opt';
            btn.innerText = i;
            btn.onclick = function() {
                grid.querySelectorAll('.btn-opt').forEach(x => x.classList.remove('active'));
                this.classList.add('active');
            };
            grid.appendChild(btn);
        }
        div.appendChild(grid);
        area.appendChild(div);
    });
    document.getElementById('data').valueAsDate = new Date();
</script>

</body>
</html>
