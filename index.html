<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LunaBia Pro Lux</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --eucalipto: #2d3d36; --eucalipto-claro: #5a7569; --glass: rgba(255, 255, 255, 0.03); --border: rgba(255, 255, 255, 0.15); }
        body { margin: 0; min-height: 100vh; font-family: 'Montserrat', sans-serif; background-image: url('1.jpeg'); background-size: cover; background-position: center; background-attachment: fixed; display: flex; justify-content: center; padding: 20px 15px; box-sizing: border-box; }
        .ilha-mae { background: rgba(255, 255, 255, 0.01); backdrop-filter: blur(50px) saturate(180%); width: 100%; max-width: 380px; border-radius: 70px; padding: 50px 15px; border: 1px solid var(--border); text-align: center; box-shadow: 0 40px 80px rgba(0,0,0,0.4); }
        h1 { font-family: 'Cinzel', serif; color: var(--eucalipto) !important; font-size: 42px; margin: 0; letter-spacing: 5px; }
        h3 { font-size: 11px; text-transform: uppercase; letter-spacing: 3px; color: var(--eucalipto) !important; font-weight: 800; margin-bottom: 20px; }
        .divider { margin: 15px auto 30px; width: 180px; opacity: 0.6; }
        .ilha-lua { background: var(--glass); border-radius: 40px; padding: 20px; margin: 0 auto 35px; width: fit-content; border: 1px solid var(--border); }
        .lua-brilhante { width: 65px; height: 65px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, #fff, #b8c6bf 40%, #2d3d36 90%); position: relative; overflow: hidden; border: 1px solid rgba(255,255,255,0.3); }
        #lua-sombra { position: absolute; width: 100%; height: 100%; background: rgba(20, 30, 25, 0.92); border-radius: 50%; transition: all 0.7s; }
        .ilha-filha { background: rgba(255, 255, 255, 0.02); border-radius: 45px; padding: 25px 15px; margin-bottom: 25px; border: 1px solid var(--border); box-shadow: 10px 10px 20px rgba(0,0,0,0.2); }
        .grid-numbers { display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; justify-items: center; }
        .btn-gv { background: rgba(255, 255, 255, 0.07); border: 1px solid var(--border); color: var(--eucalipto); cursor: pointer; border-radius: 12px; width: 40px; height: 40px; font-weight: 800; font-size: 13px; box-shadow: 4px 4px 8px rgba(0,0,0,0.3), inset 1px 1px 2px rgba(255,255,255,0.1); }
        .active { background: var(--eucalipto) !important; color: white !important; box-shadow: inset 3px 3px 6px rgba(0,0,0,0.5); }
        .grid-sintomas { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px 5px; }
        .btn-icone-bia { width: 44px; height: 44px; background: var(--eucalipto); border-radius: 12px; display: flex; align-items: center; justify-content: center; box-shadow: 4px 4px 8px rgba(0,0,0,0.3); cursor: pointer; }
        .btn-icone-bia span { font-size: 20px; }
        .label-sintoma { font-size: 6px; color: white; margin-top: 5px; font-weight: 700; text-transform: uppercase; }
        .active-icon .btn-icone-bia { background: var(--eucalipto-claro) !important; border: 1px solid white; }
        textarea, input[type="date"] { width: 100%; box-sizing: border-box; background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 20px; padding: 15px; color: var(--eucalipto); font-weight: 700; outline: none; }
        .btn-salvar { width: 100%; padding: 20px; border-radius: 40px; color: white; font-weight: 800; text-transform: uppercase; cursor: pointer; background: var(--eucalipto); margin-bottom: 10px; border: none; box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        .btn-relatorio { width: 100%; padding: 15px; border-radius: 40px; color: var(--eucalipto); font-weight: 700; text-transform: uppercase; cursor: pointer; background: transparent; border: 1px solid var(--eucalipto); }
        #modal-relatorio { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(10,20,15,0.98); backdrop-filter: blur(20px); z-index: 1000; padding: 30px 20px; box-sizing: border-box; color: white; overflow-y: auto; }
        .card-insight { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 30px; margin-bottom: 20px; border-left: 5px solid #88c0a7; }
    </style>
</head>
<body>

<div class="ilha-mae">
    <h1>LunaBia</h1>
    <div class="divider"><svg viewBox="0 0 100 20" fill="none"><path d="M10 10C30 10 35 18 50 18C65 18 70 10 90 10" stroke="#2d3d36" stroke-width="0.8"/><circle cx="50" cy="10" r="3" fill="#2d3d36"/></svg></div>
    
    <div class="ilha-lua"><div class="lua-brilhante"><div id="lua-sombra"></div></div><div id="lua-nome" style="font-size:9px; color:var(--eucalipto); font-weight:700; margin-top:10px;">...</div></div>
    
    <div class="ilha-filha"><h3>📅 Registro</h3><input type="date" id="data-input" onchange="mudarData()"></div>
    <div class="ilha-filha"><h3>📖 Bíblia</h3><div id="grid-biblia" class="grid-numbers"></div></div>
    <div id="area-escalas"></div>

    <div class="ilha-filha">
        <h3>🩺 Sintomas</h3>
        <div class="grid-sintomas">
            <div class="container-sintoma" data-sintoma="Cólica" onclick="toggleIcon(this)"><div class="btn-icone-bia"><span>🩸</span></div><div class="label-sintoma">Cólica</div></div>
            <div class="container-sintoma" data-sintoma="Inchaço" onclick="toggleIcon(this)"><div class="btn-icone-bia"><span>💧</span></div><div class="label-sintoma">Inchaço</div></div>
            <div class="container-sintoma" data-sintoma="Costas" onclick="toggleIcon(this)"><div class="btn-icone-bia"><span>🦴</span></div><div class="label-sintoma">Costas</div></div>
            <div class="container-sintoma" data-sintoma="Cabeça" onclick="toggleIcon(this)"><div class="btn-icone-bia"><span>🧠</span></div><div class="label-sintoma">Cabeça</div></div>
            <div class="container-sintoma" data-sintoma="Rinite" onclick="toggleIcon(this)"><div class="btn-icone-bia"><span>👃</span></div><div class="label-sintoma">Rinite</div></div>
            <div class="container-sintoma" data-sintoma="Estresse" onclick="toggleIcon(this)"><div class="btn-icone-bia"><span>⚡</span></div><div class="label-sintoma">Estresse</div></div>
            <div class="container-sintoma" data-sintoma="Desânimo" onclick="toggleIcon(this)"><div class="btn-icone-bia"><span>☁️</span></div><div class="label-sintoma">Desânimo</div></div>
            <div class="container-sintoma" data-sintoma="Focada" onclick="toggleIcon(this)"><div class="btn-icone-bia"><span>🎯</span></div><div class="label-sintoma">Focada</div></div>
            <div class="container-sintoma" data-sintoma="Ouvido" onclick="toggleIcon(this)"><div class="btn-icone-bia"><span>👂</span></div><div class="label-sintoma">Ouvido</div></div>
            <div class="container-sintoma" data-sintoma="Cansaço" onclick="toggleIcon(this)"><div class="btn-icone-bia"><span>😴</span></div><div class="label-sintoma">Cansaço</div></div>
        </div>
    </div>

    <button class="btn-salvar" onclick="salvarDados()">Salvar Registro</button>
    <button class="btn-relatorio" onclick="gerarRelatorio()">Análise de Sintomas & Lua</button>
</div>

<div id="modal-relatorio">
    <h2 style="font-family:'Cinzel'; text-align:center;">Insights do Bo ✨</h2>
    <div id="conteudo-relatorio"></div>
    <button onclick="document.getElementById('modal-relatorio').style.display='none'" class="btn-salvar">Voltar</button>
</div>

<script>
    const bib = document.getElementById('grid-biblia');
    for(let i=1; i<=31; i++) {
        const b = document.createElement('button'); b.className = 'btn-gv'; b.innerText = i;
        b.onclick = function() { this.classList.toggle('active'); }; bib.appendChild(b);
    }

    const escalas = ["Sono", "Humor", "Energia", "Descanso"];
    escalas.forEach(n => {
        const d = document.createElement('div'); d.className = 'ilha-filha';
        d.innerHTML = `<h3>${n}</h3><div class="btns-row grid-numbers" data-n="${n}" style="grid-template-columns: repeat(5, 1fr);"></div>`;
        const r = d.querySelector('.btns-row');
        for(let i=1; i<=5; i++) {
            const b = document.createElement('button'); b.className = 'btn-gv'; b.innerText = i;
            b.onclick = function() { r.querySelectorAll('button').forEach(x => x.classList.remove('active')); this.classList.add('active'); };
            r.appendChild(b);
        }
        document.getElementById('area-escalas').appendChild(d);
    });

    function toggleIcon(el) { el.classList.toggle('active-icon'); }

    function calcularLua(dataStr) {
        const data = new Date(dataStr + "T12:00:00");
        const dia = data.getDate(); const mes = data.getMonth() + 1; let ano = data.getFullYear();
        if (mes < 3) { ano--; mes += 12; }
        let jd = (365.25 * ano) + (30.6 * (mes + 1)) + dia - 694039.09; jd /= 29.5305882;
        let fase = (jd - Math.floor(jd)) * 100;
        return { fase, nome: fase < 5 || fase > 95 ? "Nova" : (fase > 45 && fase < 55 ? "Cheia" : (fase < 50 ? "Crescente" : "Minguante")) };
    }

    function mudarData() { 
        const d = document.getElementById('data-input').value; 
        const infoLua = calcularLua(d);
        document.getElementById('lua-sombra').style.left = infoLua.fase <= 50 ? (infoLua.fase * 2) + "%" : "-" + (100 - (infoLua.fase-50)*2) + "%";
        document.getElementById('lua-nome').innerText = "Lua " + infoLua.nome;
        carregarDados(); 
    }

    function salvarDados() {
        const data = document.getElementById('data-input').value;
        const obj = { 
            escalas: {}, 
            sintomas: Array.from(document.querySelectorAll('.active-icon')).map(i => i.dataset.sintoma),
            lua: calcularLua(data).nome
        };
        document.querySelectorAll('[data-n]').forEach(g => obj.escalas[g.dataset.n] = g.querySelector('.active')?.innerText || "0");
        localStorage.setItem('LunaBia-' + data, JSON.stringify(obj));
        alert("Bo anotou tudo! ✨");
    }

    function carregarDados() {
        const data = document.getElementById('data-input').value;
        const s = JSON.parse(localStorage.getItem('LunaBia-' + data) || '{"escalas":{},"sintomas":[]}');
        document.querySelectorAll('.active, .active-icon').forEach(x => x.classList.remove('active', 'active-icon'));
        for(let k in s.escalas) {
            const g = document.querySelector(`[data-n="${k}"]`);
            g?.querySelectorAll('button').forEach(b => { if(b.innerText == s.escalas[k]) b.classList.add('active'); });
        }
        if(s.sintomas) s.sintomas.forEach(st => document.querySelector(`[data-sintoma="${st}"]`)?.classList.add('active-icon'));
    }

    function gerarRelatorio() {
        const mesAno = document.getElementById('data-input').value.substring(0, 7);
        let contagemSintomas = {};
        let luaInchaço = { "Nova": 0, "Crescente": 0, "Cheia": 0, "Minguante": 0 };
        let totalRegistros = 0;

        for (let i = 0; i < localStorage.length; i++) {
            let chave = localStorage.key(i);
            if(chave.startsWith('LunaBia-') && chave.includes(mesAno)) {
                let d = JSON.parse(localStorage.getItem(chave));
                totalRegistros++;
                d.sintomas.forEach(s => {
                    contagemSintomas[s] = (contagemSintomas[s] || 0) + 1;
                    if(s === "Inchaço") luaInchaço[d.lua]++;
                });
            }
        }

        if(totalRegistros === 0) return alert("Selecione um mês com dados salvos primeiro.");

        let topSintoma = Object.entries(contagemSintomas).sort((a,b) => b[1] - a[1])[0];
        let faseInchada = Object.entries(luaInchaço).sort((a,b) => b[1] - a[1])[0];

        document.getElementById('conteudo-relatorio').innerHTML = `
            <div class="card-insight">
                <h3>🏆 Campeão do Mês</h3>
                <p>Bia, o sintoma que mais apareceu foi <b>${topSintoma ? topSintoma[0] : 'Nenhum'}</b> (${topSintoma ? topSintoma[1] : 0} vezes).</p>
            </div>
            <div class="card-insight">
                <h3>🌊 Detectamos um Padrão!</h3>
                <p>Notei que você costuma se sentir mais <b>inchada</b> durante a <b>Lua ${faseInchada[1] > 0 ? faseInchada[0] : '...'}</b>.</p>
            </div>
        `;
        document.getElementById('modal-relatorio').style.display = 'block';
    }

    const hoje = new Date().toISOString().split('T')[0];
    document.getElementById('data-input').value = hoje;
    mudarData();
</script>
</body>
</html>
