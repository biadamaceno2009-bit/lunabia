<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LunaBia Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --eucalipto-profundo: #2d3d36; --eucalipto-glass-escuro: rgba(45, 61, 54, 0.5); --border-glass: rgba(255, 255, 255, 0.2); }
        body { margin: 0; min-height: 100vh; font-family: 'Montserrat', sans-serif; background-image: url('1.jpeg'); background-size: cover; background-position: center; background-attachment: fixed; display: flex; justify-content: center; padding: 40px 15px; box-sizing: border-box; overflow-x: hidden; }
        .ilha-mae { background: rgba(255, 255, 255, 0.01); backdrop-filter: blur(45px) saturate(160%); width: 100%; max-width: 380px; border-radius: 65px; padding: 60px 15px; border: 1px solid var(--border-glass); text-align: center; }
        h1 { font-family: 'Cinzel', serif; color: var(--eucalipto-profundo) !important; font-size: 48px; margin: 0; letter-spacing: 5px; }
        .ilha-filha { background: rgba(255, 255, 255, 0.05); border-radius: 40px; padding: 25px 18px; margin-bottom: 30px; border: 1px solid var(--border-glass); backdrop-filter: blur(15px); }
        h3 { font-size: 10px; text-transform: uppercase; letter-spacing: 3px; color: white; font-weight: 700; margin-bottom: 15px; }
        .btn-glass-verde { background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.3); color: white; cursor: pointer; border-radius: 50%; width: 42px; height: 42px; font-weight: 700; }
        .active { background: var(--eucalipto-profundo) !important; border: 1px solid white !important; }
        .active-icon { background: var(--eucalipto-profundo) !important; border-radius: 12px; border: 1px solid white !important; }
        .grid-icones-bia { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
        .container-sintoma { display: flex; flex-direction: column; align-items: center; cursor: pointer; }
        .btn-icone-bia { width: 44px; height: 44px; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 12px; display: flex; align-items: center; justify-content: center; }
        .btn-icone-bia img, .svg-colica { width: 26px; height: 26px; filter: brightness(0) invert(1); }
        .label-sintoma { font-size: 7.5px; color: white; margin-top: 5px; text-transform: uppercase; }
        textarea, input[type="date"] { width: 100%; box-sizing: border-box; background: rgba(255,255,255,0.1); border: 1px solid var(--border-glass); border-radius: 20px; padding: 18px; color: var(--eucalipto-profundo); font-weight: 600; outline: none; }
        .btn-salvar { width: 100%; padding: 22px; border-radius: 35px; border: 1px solid rgba(255,255,255,0.3); color: white; font-weight: 800; text-transform: uppercase; cursor: pointer; background: var(--eucalipto-profundo); margin-top: 10px; }

        /* MODAL ANALÍTICO OFFLINE */
        #modal-relatorio { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:2000; padding:20px; box-sizing:border-box; overflow-y:auto; justify-content:center; }
        .card-analise { background:#f4f7f5; border-radius:40px; padding:25px; width:100%; max-width:350px; color: var(--eucalipto-profundo); }
        .box-info { background: white; border-radius: 20px; padding: 15px; margin-bottom: 15px; text-align: left; border-left: 5px solid var(--eucalipto-profundo); }
        
        /* Gráfico de Barras Offline */
        .barra-container { display: flex; align-items: flex-end; height: 40px; background: #eee; border-radius: 5px; overflow: hidden; margin-top: 5px; }
        .barra-fill { height: 100%; background: var(--eucalipto-profundo); transition: width 0.5s; }
    </style>
</head>
<body>

<div id="modal-relatorio">
    <div class="card-analise">
        <h2 style="font-family:'Cinzel'; text-align:center; font-size:22px;">Análise Brilhante ✨</h2>
        <div id="conteudo-relatorio"></div>
        <button class="btn-salvar" onclick="document.getElementById('modal-relatorio').style.display='none'">Fechar</button>
    </div>
</div>

<div class="ilha-mae">
    <h1>LunaBia</h1>
    <div class="ilha-filha"><h3>📅 Registro</h3><input type="date" id="data-input" onchange="carregarDados()"></div>
    <div id="area-escalas"></div>
    <div class="ilha-filha">
        <h3>Sintomas</h3>
        <div class="grid-icones-bia">
            <div class="container-sintoma" data-sintoma="Cólica" onclick="toggleIcon(this)"><div class="btn-icone-bia">🩸</div><div class="label-sintoma">Cólica</div></div>
            <div class="container-sintoma" data-sintoma="Inchaço" onclick="toggleIcon(this)"><div class="btn-icone-bia">🎈</div><div class="label-sintoma">Inchaço</div></div>
            <div class="container-sintoma" data-sintoma="Estresse" onclick="toggleIcon(this)"><div class="btn-icone-bia">⚡</div><div class="label-sintoma">Estresse</div></div>
        </div>
    </div>
    <button class="btn-salvar" onclick="salvar()">Salvar Registro</button>
    <button class="btn-salvar" style="background:rgba(255,255,255,0.2); color:#2d3d36; font-size: 11px;" onclick="gerarRelatorioAnalitico()">Gerar Relatório Analítico</button>
</div>

<script>
    // Gerar escalas
    const escNome = ["Sono", "Humor", "Energia", "Descanso"];
    escNome.forEach(n => {
        const d = document.createElement('div'); d.className = 'ilha-filha';
        d.innerHTML = `<h3>${n}</h3><div class="grid-btns" data-n="${n}" style="display:flex; justify-content:space-between;"></div>`;
        const g = d.querySelector('.grid-btns');
        for(let i=1; i<=5; i++) {
            const b = document.createElement('button'); b.className = 'btn-glass-verde'; b.innerText = i;
            b.onclick = function() { g.querySelectorAll('button').forEach(x => x.classList.remove('active')); this.classList.add('active'); };
            g.appendChild(b);
        }
        document.getElementById('area-escalas').appendChild(d);
    });

    function toggleIcon(el) { el.classList.toggle('active-icon'); }

    function getLua(data) {
        const lp = 2551443; const new_m = new Date('1970-01-07T20:35:00Z').getTime();
        const d = new Date(data + "T12:00:00").getTime();
        const phase = ((d - new_m) / 1000) % lp; const days = phase / (24 * 3600);
        if (days < 1.84 || days > 27.67) return "Nova";
        if (days < 9.22) return "Crescente";
        if (days < 16.61) return "Cheia";
        return "Minguante";
    }

    function salvar() {
        const data = document.getElementById('data-input').value;
        const esc = {};
        document.querySelectorAll('[data-n]').forEach(g => esc[g.dataset.n] = g.querySelector('.active')?.innerText || "0");
        const obj = { escalas: esc, sintomas: Array.from(document.querySelectorAll('.active-icon')).map(i => i.dataset.sintoma), lua: getLua(data) };
        localStorage.setItem('LunaBia-' + data, JSON.stringify(obj));
        alert("Bo salvou seus dados! ✨");
    }

    function carregarDados() {
        const data = document.getElementById('data-input').value;
        const s = JSON.parse(localStorage.getItem('LunaBia-' + data) || '{"escalas":{},"sintomas":[]}');
        document.querySelectorAll('.active, .active-icon').forEach(x => x.classList.remove('active', 'active-icon'));
        for(let k in s.escalas) {
            const g = document.querySelector(`[data-n="${k}"]`);
            g?.querySelectorAll('button').forEach(b => { if(b.innerText == s.escalas[k]) b.classList.add('active'); });
        }
        if(s.sintomas) s.sintomas.forEach(st => document.querySelector(`[data-sintoma="${st}"]`)?.classList.add('active-icon'));
    }

    function gerarRelatorioAnalitico() {
        const mes = document.getElementById('data-input').value.substring(0, 7);
        let soma = {Sono:0, Humor:0, Energia:0, Descanso:0}, conta = 0, luaImpacto = {Nova:[], Crescente:[], Cheia:[], Minguante:[]};

        for (let i = 0; i < localStorage.length; i++) {
            const c = localStorage.key(i);
            if (c.startsWith('LunaBia-') && c.includes(mes)) {
                const d = JSON.parse(localStorage.getItem(c));
                conta++;
                for(let k in soma) soma[k] += parseInt(d.escalas[k] || 0);
                if(d.lua) luaImpacto[d.lua].push(parseInt(d.escalas.Humor || 0));
            }
        }

        if(conta === 0) return alert("Nenhum dado encontrado para Abril. Salve alguns dias primeiro!");

        let html = "";
        for(let k in soma) {
            let med = (soma[k] / conta).toFixed(1);
            html += `<div class="box-info">
                <h4 style="margin:0; font-size:10px; text-transform:uppercase;">${k} (Média: ${med})</h4>
                <div class="barra-container"><div class="barra-fill" style="width:${(med/5)*100}%"></div></div>
            </div>`;
        }

        let piorLua = ""; let minH = 6;
        for(let l in luaImpacto) {
            if(luaImpacto[l].length > 0) {
                let m = luaImpacto[l].reduce((a,b)=>a+b)/luaImpacto[l].length;
                if(m < minH) { minH = m; piorLua = l; }
            }
        }

        html += `<div class="box-info" style="border-left-color: #5a7569;">
            <h4 style="margin:0; font-size:10px;">🌙 INSIGHT DO BO</h4>
            <p style="font-size:12px; margin-top:10px;">Bia, notei que na <b>Lua ${piorLua || '...'}</b> seu humor tende a ser mais baixo. Com ${conta} dias registrados, sua média geral está equilibrada!</p>
        </div>`;

        document.getElementById('conteudo-relatorio').innerHTML = html;
        document.getElementById('modal-relatorio').style.display = 'flex';
    }

    document.getElementById('data-input').value = new Date().toISOString().split('T')[0];
    carregarDados();
</script>
</body>
</html>
