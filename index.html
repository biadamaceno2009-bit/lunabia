<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LunaBia - Oficial</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --terracota-grad: linear-gradient(135deg, #b87355, #804832);
            --glass-mae: rgba(255, 255, 255, 0.15); /* Um pouco mais visível */
            --glass-filha: rgba(255, 255, 255, 0.1);
            --text-brown: #633624;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
            /* AQUI ESTÁ O SEGREDO DO FUNDO: nome exato que está no seu GitHub */
            background-image: url('papeldeparede.png'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-color: #f4ece6; /* Cor de reserva caso a imagem falhe */
            display: flex;
            justify-content: center;
            padding: 20px 10px;
        }

        .container {
            background: var(--glass-mae);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            width: 100%;
            max-width: 500px;
            border-radius: 40px;
            padding: 30px 20px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.15);
            text-align: center;
        }

        /* AJUSTE DA LOGO - Ficou mais delicada e proporcional */
        .logo-container {
            margin-bottom: 25px;
        }

        h1 { 
            font-family: 'Great Vibes', cursive; 
            color: #804832; 
            font-size: 55px; /* Reduzi um pouco para ficar mais harmônico */
            margin: 0;
            line-height: 1;
            text-shadow: 1px 1px 3px rgba(255,255,255,0.5);
        }

        .subtitle {
            font-size: 10px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--text-brown);
            margin-top: -5px;
            opacity: 0.8;
        }

        .card {
            background: var(--glass-filha);
            backdrop-filter: blur(5px);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        h3 { color: var(--text-brown); text-transform: uppercase; font-size: 12px; margin-bottom: 15px; letter-spacing: 1px; }

        .grid-layout { display: grid; gap: 8px; justify-content: center; }
        .grid-7 { grid-template-columns: repeat(7, 1fr); }
        .grid-5 { grid-template-columns: repeat(5, 1fr); }

        .btn-opt {
            background: rgba(255, 255, 255, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            width: 38px; height: 38px;
            cursor: pointer;
            color: #4a3728;
            font-weight: 600;
            font-size: 13px;
            transition: 0.3s;
        }

        .active { background: var(--terracota-grad) !important; color: white !important; transform: scale(1.1); box-shadow: 0 4px 10px rgba(128, 72, 50, 0.3); }

        textarea, input[type="date"] {
            width: 100%; box-sizing: border-box; background: rgba(255,255,255,0.3);
            border: 1px solid rgba(255,255,255,0.5); border-radius: 15px; padding: 12px;
            color: #4a3728; font-family: inherit; font-size: 14px;
        }

        .btn-save {
            width: 100%; padding: 18px; border-radius: 20px; border: none;
            background: var(--terracota-grad); color: white; font-weight: bold;
            letter-spacing: 1px; cursor: pointer; font-size: 14px; margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="logo-container">
        <h1>LunaBia</h1>
        <div class="subtitle">Journal & Care</div>
    </div>

    <div class="card">
        <h3>📅 Data do Registro</h3>
        <input type="date" id="dataPrincipal">
    </div>

    <div class="card">
        <h3>📖 Leitura Bíblica</h3>
        <div class="grid-layout grid-7" id="bibliaContainer"></div>
    </div>

    <div id="escalas"></div>

    <div class="card">
        <h3>📝 Diário</h3>
        <textarea rows="4" placeholder="O que o Senhor falou hoje?"></textarea>
    </div>

    <button class="btn-save">SALVAR NO MEU DIÁRIO</button>
</div>

<script>
    // Gerar dias do mês
    const biblia = document.getElementById('bibliaContainer');
    for(let i=1; i<=31; i++){
        const b = document.createElement('button');
        b.className = 'btn-opt';
        b.innerText = i;
        b.onclick = () => b.classList.toggle('active');
        biblia.appendChild(b);
    }

    // Gerar Escalas
    const nomesEscalas = ["Sono", "Humor", "Cansaço", "Descanso", "Energia"];
    const escalasDiv = document.getElementById('escalas');
    nomesEscalas.forEach(nome => {
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `<h3>${nome}</h3>`;
        const grid = document.createElement('div');
        grid.className = 'grid-layout grid-5';
        for(let i=1; i<=5; i++){
            const btn = document.createElement('button');
            btn.className = 'btn-opt';
            btn.innerText = i;
            btn.onclick = function() {
                grid.querySelectorAll('.btn-opt').forEach(x => x.classList.remove('active'));
                this.classList.add('active');
            };
            grid.appendChild(btn);
        }
        card.appendChild(grid);
        escalasDiv.appendChild(card);
    });

    document.getElementById('dataPrincipal').valueAsDate = new Date();
</script>

</body>
</html>
