<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LunaBia</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --glass-white: rgba(255, 255, 255, 0.03); /* Transparência total */
            --glass-border: rgba(255, 255, 255, 0.4);
            --terracota: linear-gradient(135deg, #b87355, #804832);
            --text: #5c3b2e;
        }

        body {
            margin: 0; min-height: 100vh; font-family: 'Montserrat', sans-serif;
            background-image: url('papeldeparede.png'); background-size: cover;
            background-position: center; background-attachment: fixed;
            display: flex; justify-content: center; padding: 25px 15px; box-sizing: border-box;
        }

        /* ILHA MÃE - VIDRO LÍQUIDO EXTREMO */
        .container {
            background: var(--glass-white);
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            width: 100%; max-width: 450px; border-radius: 50px; padding: 35px 15px;
            border: 1px solid var(--glass-border);
            border-top: 2px solid rgba(255, 255, 255, 0.7);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.2);
            text-align: center;
        }

        h1 { 
            font-family: 'Playfair Display', serif; font-style: italic;
            color: #7a422d; font-size: 58px; margin: 0 0 30px 0;
            text-shadow: 2px 2px 15px rgba(255,255,255,0.4);
        }

        /* ILHAS FILHAS - MAIS TRANSPARENTES */
        .card {
            background: rgba(255, 255, 255, 0.02); border-radius: 25px; padding: 20px;
            margin-bottom: 25px; border: 1px solid rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(5px);
        }

        h3 { color: var(--text); text-transform: uppercase; font-size: 10px; margin-bottom: 15px; letter-spacing: 2.5px; font-weight: 700; opacity: 0.7; }

        /* BOTÕES GLASS SOMBREADOS */
        .btn-opt, .btn-rect {
            background: rgba(255, 255, 255, 0.1); 
            border: 1px solid rgba(255, 255, 255, 0.3);
            cursor: pointer; color: var(--text); font-weight: 600; 
            transition: 0.3s; box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        .btn-opt { border-radius: 50%; width: 36px; height: 36px; }
        .btn-rect { border-radius: 14px; padding: 12px; font-size: 11px; text-transform: uppercase; }

        .active { 
            background: var(--terracota) !important; color: white !important; 
            border: none; transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(128, 72, 50, 0.4);
        }

        /* INPUTS GLASS */
        textarea, input[type="date"] {
            width: 100%; box-sizing: border-box; background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 18px; padding: 15px;
            color: var(--text); font-family: inherit; outline: none;
        }

        .action-row { display: flex; gap: 12px; margin-top: 15px; }
        .btn-action { 
            flex: 1; padding: 20px; border-radius: 25px; border: none; color: white; 
            font-weight: 700; cursor: pointer; text-transform: uppercase;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        .btn-save { background: var(--terracota); }
        .btn-report { background: linear-gradient(135deg, #a8c1a9, #7a9d7e); color: #1a261b; }

        /* MODAL RELATÓRIO */
        #modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(15px); z-index: 999;
            padding: 20px; box-sizing: border-box; overflow-y: auto;
        }
        .modal-body { background: #fffdfc; border-radius: 40px; padding: 30px 20px; max-width: 450px; margin: auto; }
    </style>
</head>
<body>

<div class="container">
    <h1>LunaBia</h1>

    <div class="card">
        <h3>📅 Data do Registro</h3>
        <input type="date" id="data" onchange="carregarData()">
    </div>

    <div class="card">
        <h3>📖 Leitura Bíblica</h3>
        <div id="grid-biblia" style="display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px;"></div>
    </div>

    <div class="card">
        <h3>✨ Versículo</h3>
        <textarea id="versiculo" rows="2" placeholder="Palavra de hoje..."></textarea>
    </div>

    <div id="escalas"></div>

    <div class="card" id="card-ciclo">
        <h3>🩸 Ciclo Menstrual</h3>
        <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px;">
            <button class="btn-rect" onclick="soUm(this)">Leve</button>
            <button class="btn-rect" onclick="soUm(this)">Moderado</button>
            <button class="btn-rect" onclick="soUm(this)">Intenso</button>
        </div>
    </div>

    <div class="card" id="card-sintomas">
        <h3>🤒 Sintomas</h3>
        <div style="display: flex; flex-wrap: wrap; gap: 8px; justify-content: center;">
            <button class="btn-rect" onclick="this.classList.toggle('active')">Cólica</button>
            <button class="btn-rect" onclick="this.classList.toggle('active')">Inchaço</button>
            <button class="btn-rect" onclick="this.classList.toggle('active')">Dor nas costas</button>
            <button class="btn-rect" onclick="this.classList.toggle('active')">Está tudo bem</button>
            <button class="btn-rect" onclick="this.classList.toggle('active')">Dor de cabeça</button>
            <button class="btn-rect" onclick="this.classList.toggle('active')">Insônia</button>
        </div>
    </div>

    <div class="card">
        <h3>✍️ Meu Diário</h3>
        <textarea id="diario" rows="4" placeholder="O que o Senhor falou?"></textarea>
    </div>

    <div class="action-row">
        <button class="btn-action btn-save" onclick="salvar()">SALVAR</button>
        <button class="btn-action btn-report" onclick="abrirRelatorio()">RELATÓRIO</button>
    </div>
</div>

<div id="modal"><div class="modal-body" id="modal-content"></div></div>

<script>
    // Gerar Elementos
    const biblia = document.getElementById('grid-biblia');
    for(let i=1; i<=31; i++) {
        const b = document.createElement('button'); b.className = 'btn-opt'; b.innerText = i;
        b.onclick = () => b.classList.toggle('active'); biblia.appendChild(b);
    }

    const cats = ["Sono", "Humor", "Cansaço", "Descanso", "Energia"];
    cats.forEach(n => {
        const c = document.createElement('div'); c.className = 'card'; c.innerHTML = `<h3>${n}</h3>`;
        const g = document.createElement('div'); g.style = "display:grid; grid-template-columns:repeat(5,1fr); gap:8px;";
        for(let i=1; i<=5; i++) {
            const b = document.createElement('button'); b.className = 'btn-opt sc-btn'; b.innerText = i; b.dataset.n = n;
            b.onclick = function() { g.querySelectorAll('.btn-opt').forEach(x => x.classList.remove('active')); this.classList.add('active'); };
            g.appendChild(b);
        }
        c.appendChild(g); document.getElementById('escalas').appendChild(c);
    });

    function soUm(btn) {
        btn.parentElement.querySelectorAll('.btn-rect').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    // LÓGICA DE DADOS
    function salvar() {
        const d = document.getElementById('data').value;
        const entry = {
            biblia: Array.from(document.querySelectorAll('#grid-biblia .active')).map(b => b.innerText),
            versiculo: document.getElementById('versiculo').value,
            escalas: {},
            ciclo: document.querySelector('#card-ciclo .active')?.innerText || "",
            sintomas: Array.from(document.querySelectorAll('#card-sintomas .active')).map(b => b.innerText),
            diario: document.getElementById('diario').value
        };
        document.querySelectorAll('.sc-btn.active').forEach(b => entry.escalas[b.dataset.n] = b.innerText);
        
        let db = JSON.parse(localStorage.getItem('lunabia_v3') || "{}");
        db[d] = entry;
        localStorage.setItem('lunabia_v3', JSON.stringify(db));
        alert("LunaBia: Guardado com sucesso! 🙏");
    }

    function carregarData() {
        const d = document.getElementById('data').value;
        const db = JSON.parse(localStorage.getItem('lunabia_v3') || "{}");
        const data = db[d];

        // Limpar tudo antes
        document.querySelectorAll('.active').forEach(b => b.classList.remove('active'));
        document.getElementById('versiculo').value = "";
        document.getElementById('diario').value = "";

        if(data) {
            document.getElementById('versiculo').value = data.versiculo;
            document.getElementById('diario').value = data.diario;
            data.biblia.forEach(n => {
                const b = Array.from(document.querySelectorAll('#grid-biblia .btn-opt')).find(x => x.innerText == n);
                if(b) b.classList.add('active');
            });
            Object.keys(data.escalas).forEach(k => {
                const b = Array.from(document.querySelectorAll(`.sc-btn[data-n="${k}"]`)).find(x => x.innerText == data.escalas[k]);
                if(b) b.classList.add('active');
            });
            if(data.ciclo) Array.from(document.querySelectorAll('#card-ciclo .btn-rect')).find(x => x.innerText == data.ciclo)?.classList.add('active');
            data.sintomas.forEach(s => Array.from(document.querySelectorAll('#card-sintomas .btn-rect')).find(x => x.innerText == s)?.classList.add('active'));
        }
    }

    function abrirRelatorio() {
        const db = JSON.parse(localStorage.getItem('lunabia_v3') || "{}");
        const modal = document.getElementById('modal');
        const content = document.getElementById('modal-content');
        
        let html = `<h2 style="font-family:'Playfair Display'; font-style:italic; color:#804832;">Relatório Inteligente</h2>`;
        
        // Simulação de Análise
        const datas = Object.keys(db).sort().reverse();
        if(datas.length > 0) {
            html += `<div style="background:#fdf2ed; padding:15px; border-radius:15px; text-align:left; font-size:13px; margin-bottom:20px;">
                <b>💡 Insight do Bo:</b> Bia, continue firme na leitura! ${db[datas[0]].biblia.length > 0 ? 'Você está indo muito bem hoje.' : 'Ainda dá tempo de ler a palavra hoje!'}
            </div>`;
            
            datas.forEach(dt => {
                const log = db[dt];
                html += `<div style="border-bottom:1px solid #eee; padding:10px 0; text-align:left; font-size:12px;">
                    <b>📅 ${dt}</b> | 🩸 ${log.ciclo || '-'}<br>
                    ✨ Versículo: ${log.versiculo.substring(0,30)}...
                </div>`;
            });
        } else { html += "<p>Sem dados ainda.</p>"; }

        html += `<button onclick="document.getElementById('modal').style.display='none'" class="btn-action btn-save" style="margin-top:20px; width:100%;">FECHAR</button>`;
        content.innerHTML = html;
        modal.style.display = 'block';
    }

    document.getElementById('data').valueAsDate = new Date();
    carregarData();
</script>
</body>
</html>
