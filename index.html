<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LunaBia Final</title>
    <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@1,6..96,700&family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --eucalipto-profundo: #2d3d36; /* Verde bem escuro e maduro */
            --eucalipto-glass: rgba(45, 61, 54, 0.4); /* Translúcido para as ilhas */
            --glass-puro: rgba(255, 255, 255, 0.05);
        }

        body {
            margin: 0; min-height: 100vh; font-family: 'Montserrat', sans-serif;
            background-image: url('1.jpeg'); background-size: cover;
            background-position: center; background-attachment: fixed;
            display: flex; justify-content: center; padding: 40px 15px; box-sizing: border-box;
        }

        .ilha-mae {
            background: rgba(255, 255, 255, 0.01);
            backdrop-filter: blur(40px) saturate(150%);
            -webkit-backdrop-filter: blur(40px) saturate(150%);
            width: 100%; max-width: 380px; border-radius: 65px; padding: 60px 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
        }

        /* LUNABIA - FONTE IMPOENTE E VERDE ESCURO */
        h1 { 
            font-family: 'Bodoni Moda', serif; font-style: italic; font-weight: 700;
            color: var(--eucalipto-profundo) !important; font-size: 62px; margin: 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1); /* Sombra mínima, apenas para relevo */
            -webkit-text-fill-color: var(--eucalipto-profundo);
        }

        /* FASE LUNAR COM EFEITO GLASS REAL */
        .ilha-lua {
            background: rgba(255, 255, 255, 0.03); border-radius: 30px;
            padding: 20px; margin: 25px auto 50px; width: fit-content;
            border: 1px solid rgba(255,255,255,0.15);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2), inset 0 0 15px rgba(255,255,255,0.1);
        }
        #lua-visual { font-size: 40px; filter: drop-shadow(0 0 10px rgba(255,255,255,0.3)); }
        #lua-nome { font-size: 9px; text-transform: uppercase; letter-spacing: 3px; color: var(--eucalipto-profundo); font-weight: 700; margin-top: 8px; }

        /* ILHAS FILHAS - LIMPAS E TRANSLÚCIDAS */
        .ilha-filha {
            background: var(--glass-puro); border-radius: 40px;
            padding: 25px 18px; margin-bottom: 40px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
        }
        
        /* ILHA ESPECÍFICA VERDE EUCALIPTO TRANSLÚCIDA (Leitura e Sintomas) */
        .ilha-verde {
            background: var(--eucalipto-glass) !important;
            border: 1px solid rgba(255, 255, 255, 0.2) !important;
        }

        h3 { font-size: 10px; text-transform: uppercase; letter-spacing: 3px; margin: 0 0 20px 0; color: white; font-weight: 600; opacity: 0.9; }

        /* BOTÕES COM EFEITO FLUTUANTE */
        .btn-glass {
            background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.3);
            cursor: pointer; color: white; font-weight: 700; transition: all 0.4s;
            box-shadow: 0 8px 15px rgba(0,0,0,0.2); /* Efeito flutuante */
        }
        .btn-opt { border-radius: 50%; width: 42px; height: 42px; }
        .btn-rect { border-radius: 18px; padding: 15px; font-size: 10px; text-transform: uppercase; width: 100%; }

        /* ATIVO - VERDE EUCALIPTO */
        .active { 
            background: var(--eucalipto-profundo) !important; 
            border: 1px solid rgba(255,255,255,0.4) !important;
            transform: translateY(-5px); /* Salta ao clicar */
            box-shadow: 0 15px 30px rgba(0,0,0,0.4);
        }

        textarea, input[type="date"] {
            width: 100%; box-sizing: border-box; background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 18px;
            color: white; font-family: inherit; font-size: 16px; outline: none;
        }

        .action-row { display: flex; gap: 15px; margin-top: 20px; }
        .btn-action { 
            flex: 1; padding: 25px; border-radius: 35px; border: 1px solid rgba(255,255,255,0.2);
            color: white; font-weight: 700; text-transform: uppercase; font-size: 12px;
            backdrop-filter: blur(15px); background: var(--eucalipto-glass);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

<div class="ilha-mae">
    <h1>LunaBia</h1>
    
    <div class="ilha-lua">
        <div id="lua-visual">🌑</div>
        <div id="lua-nome">Carregando...</div>
    </div>

    <div class="ilha-filha">
        <h3>📅 Momento</h3>
        <input type="date" id="data-input" onchange="carregarData()">
    </div>

    <div class="ilha-filha ilha-verde">
        <h3>📖 Leitura Bíblica</h3>
        <div id="grid-biblia" style="display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; justify-items: center;"></div>
    </div>

    <div class="ilha-filha">
        <h3>✨ Versículo</h3>
        <textarea id="v-input" rows="2" placeholder="O que Ele disse hoje?"></textarea>
    </div>

    <div id="area-escalas"></div>

    <div class="ilha-filha">
        <h3>🩸 Ciclo</h3>
        <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px;">
            <button class="btn-glass btn-rect" onclick="soUm(this)">Leve</button>
            <button class="btn-glass btn-rect" onclick="soUm(this)">Mod.</button>
            <button class="btn-glass btn-rect" onclick="soUm(this)">Int.</button>
        </div>
    </div>

    <div class="ilha-filha ilha-verde">
        <h3>🤒 Sintomas</h3>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
            <button class="btn-glass btn-rect" onclick="this.classList.toggle('active')">Cólica</button>
            <button class="btn-glass btn-rect" onclick="this.classList.toggle('active')">Inchaço</button>
            <button class="btn-glass btn-rect" onclick="this.classList.toggle('active')">D. Cabeça</button>
            <button class="btn-glass btn-rect" onclick="this.classList.toggle('active')">D. Costas</button>
            <button class="btn-glass btn-rect" onclick="this.classList.toggle('active')">Rinite</button>
            <button class="btn-glass btn-rect" onclick="this.classList.toggle('active')">Insônia</button>
        </div>
    </div>

    <div class="ilha-filha">
        <h3>✍️ Diário</h3>
        <textarea id="d-input" rows="4" placeholder="Abra seu coração..."></textarea>
    </div>

    <div class="action-row">
        <button class="btn-action" onclick="salvar()">SALVAR</button>
        <button class="btn-action" onclick="abrirRelatorio()">HISTÓRICO</button>
    </div>
</div>

<script>
    function updateMoon() {
        const date = new Date();
        const lp = 2551443; 
        const new_moon = new Date('1970-01-07T20:35:00Z').getTime();
        const phase = ((date.getTime() - new_moon) / 1000) % lp;
        const days = phase / (24 * 3600);
        let res = { emoji: '🌑', nome: 'Lua Nova' };
        if (days < 1.84) res = { emoji: '🌑', nome: 'Lua Nova' };
        else if (days < 5.53) res = { emoji: '🌒', nome: 'Crescente' };
        else if (days < 9.22) res = { emoji: '🌓', nome: 'Quarto Crescente' };
        else if (days < 12.91) res = { emoji: '🌔', nome: 'Gibosa Crescente' };
        else if (days < 16.61) res = { emoji: '🌕', nome: 'Lua Cheia' };
        else if (days < 20.30) res = { emoji: '🌖', nome: 'Gibosa Minguante' };
        else if (days < 23.99) res = { emoji: '🌗', nome: 'Quarto Minguante' };
        else if (days < 27.68) res = { emoji: '🌘', nome: 'Lua Minguante' };
        document.getElementById('lua-visual').innerText = res.emoji;
        document.getElementById('lua-nome').innerText = res.nome;
    }

    const bib = document.getElementById('grid-biblia');
    for(let i=1; i<=31; i++) {
        const b = document.createElement('button'); b.className = 'btn-glass btn-opt'; b.innerText = i;
        b.onclick = () => b.classList.toggle('active'); bib.appendChild(b);
    }

    const nomes = ["Sono", "Humor", "Cansaço", "Descanso", "Energia"];
    const area = document.getElementById('area-escalas');
    nomes.forEach(n => {
        const f = document.createElement('div'); f.className = 'ilha-filha'; f.innerHTML = `<h3>${n}</h3>`;
        const g = document.createElement('div'); g.style = "display:grid; grid-template-columns:repeat(5, 1fr); gap:12px; justify-items:center;";
        for(let i=1; i<=5; i++) {
            const bt = document.createElement('button'); bt.className = 'btn-glass btn-opt s-btn'; bt.innerText = i; bt.dataset.cat = n;
            bt.onclick = function() { g.querySelectorAll('.btn-opt').forEach(x => x.classList.remove('active')); this.classList.add('active'); };
            g.appendChild(bt);
        }
        f.appendChild(g); area.appendChild(f);
    });

    function soUm(btn) {
        btn.parentElement.querySelectorAll('.btn-rect').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    function salvar() { alert("LunaBia Pro: Salvo com sucesso! ✨🌿"); }
    function carregarData() { document.querySelectorAll('.active').forEach(b => b.classList.remove('active')); }
    function abrirRelatorio() { alert("Histórico em breve!"); }

    document.getElementById('data-input').valueAsDate = new Date();
    updateMoon();
</script>
</body>
</html>
