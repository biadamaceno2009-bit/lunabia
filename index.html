<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LunaBia</title>
    <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@1,6..96,700&family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --gold-active: linear-gradient(135deg, #f7e7ce, #d4af37);
            --text-brown: #5c3b2e;
            --glass-bg: rgba(255, 255, 255, 0.02);
        }

        body {
            margin: 0; min-height: 100vh; font-family: 'Montserrat', sans-serif;
            background-image: url('papeldeparede.png'); background-size: cover;
            background-position: center; background-attachment: fixed;
            display: flex; justify-content: center; padding: 20px 10px; box-sizing: border-box;
            color: var(--text-brown);
        }

        /* ILHA MÃE - VOLTANDO AO ESTILO INTEGRADO */
        .container {
            background: rgba(255, 255, 255, 0.01);
            backdrop-filter: blur(30px) saturate(160%);
            -webkit-backdrop-filter: blur(30px) saturate(160%);
            width: 100%; max-width: 450px; border-radius: 50px; padding: 40px 15px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-top: 2px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
            text-align: center;
        }

        h1 { 
            font-family: 'Bodoni Moda', serif; font-style: italic;
            color: #7a422d; font-size: 55px; margin: 0 0 10px 0;
            text-shadow: 2px 2px 15px rgba(255,255,255,0.3);
        }

        /* A LUA REAL COM TEXTURA */
        .moon-container { margin-bottom: 30px; display: flex; flex-direction: column; align-items: center; }
        .real-moon {
            width: 70px; height: 70px; border-radius: 50%;
            background: #d1d1d1;
            position: relative; overflow: hidden;
            box-shadow: inset -10px -10px 20px rgba(0,0,0,0.2), 0 0 20px rgba(255,255,255,0.4);
            background-image: 
                radial-gradient(circle at 20% 30%, #b5b5b5 10%, transparent 12%),
                radial-gradient(circle at 60% 20%, #b5b5b5 8%, transparent 10%),
                radial-gradient(circle at 40% 70%, #b5b5b5 12%, transparent 15%),
                radial-gradient(circle at 80% 60%, #b5b5b5 6%, transparent 8%);
        }
        .moon-label { font-size: 10px; letter-spacing: 3px; text-transform: uppercase; margin-top: 10px; opacity: 0.7; font-weight: 700; }

        /* ILHAS FILHAS - FIXAS E INTEGRADAS */
        .card {
            background: rgba(255, 255, 255, 0.03); border-radius: 25px; padding: 18px;
            margin-bottom: 20px; border: 1px solid rgba(255, 255, 255, 0.1);
        }

        h3 { color: var(--text-brown); text-transform: uppercase; font-size: 9px; margin-bottom: 12px; letter-spacing: 2px; font-weight: 700; opacity: 0.7; }

        /* BOTÕES GLASS COM CLIQUE DOURADO */
        .btn-opt, .btn-rect {
            background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2);
            cursor: pointer; color: var(--text-brown); font-weight: 600; transition: 0.3s;
        }
        .btn-opt { border-radius: 50%; width: 36px; height: 36px; font-size: 11px; }
        .btn-rect { border-radius: 15px; padding: 12px; font-size: 10px; text-transform: uppercase; }

        .active { 
            background: var(--gold-active) !important; color: #5c3b2e !important; 
            border: none; transform: scale(1.05); box-shadow: 0 8px 20px rgba(212, 175, 55, 0.3);
        }

        textarea, input[type="date"] {
            width: 100%; box-sizing: border-box; background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 15px; padding: 14px;
            color: var(--text-brown); font-family: inherit; font-size: 14px;
        }

        .action-row { display: flex; gap: 12px; margin-top: 15px; }
        .btn-action { flex: 1; padding: 18px; border-radius: 25px; border: none; color: white; font-weight: 700; cursor: pointer; text-transform: uppercase; }
        .btn-save { background: linear-gradient(135deg, #b87355, #804832); }
        .btn-report { background: linear-gradient(135deg, #a8c1a9, #7a9d7e); color: #1a261b; }

        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(20px); z-index: 999; padding: 20px; box-sizing: border-box; }
        .modal-content { background: #fffcfb; border-radius: 40px; padding: 30px 20px; max-width: 450px; margin: auto; height: 80vh; overflow-y: auto; }
    </style>
</head>
<body>

<div class="container">
    <h1>LunaBia</h1>
    
    <div class="moon-container">
        <div class="real-moon"></div>
        <div class="moon-label">Quarto Minguante</div>
    </div>

    <div class="card">
        <h3>📅 Data do Registro</h3>
        <input type="date" id="data-input" onchange="carregarData()">
    </div>

    <div class="card">
        <h3>📖 Leitura Bíblica</h3>
        <div id="biblia-grid" style="display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px;"></div>
    </div>

    <div class="card">
        <h3>✨ Versículo do Dia</h3>
        <textarea id="v-input" rows="2" placeholder="O que o Senhor falou hoje?"></textarea>
    </div>

    <div id="escalas-placeholder"></div>

    <div class="card" id="secao-ciclo">
        <h3>🩸 Ciclo Menstrual</h3>
        <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px;">
            <button class="btn-rect" onclick="singleSelect(this)">Leve</button>
            <button class="btn-rect" onclick="singleSelect(this)">Moderado</button>
            <button class="btn-rect" onclick="singleChoice(this)">Intenso</button>
        </div>
    </div>

    <div class="card" id="secao-sintomas">
        <h3>🤒 Sintomas</h3>
        <div style="display: flex; flex-wrap: wrap; gap: 8px; justify-content: center;">
            <button class="btn-rect" onclick="this.classList.toggle('active')">Cólica</button>
            <button class="btn-rect" onclick="this.classList.toggle('active')">Inchaço</button>
            <button class="btn-rect" onclick="this.classList.toggle('active')">Dor nas costas</button>
            <button class="btn-rect" onclick="this.classList.toggle('active')">Está tudo bem</button>
            <button class="btn-rect" onclick="this.classList.toggle('active')">Dor de cabeça</button>
            <button class="btn-rect" onclick="this.classList.toggle('active')">Insônia</button>
        </div>
    </div>

    <div class="card">
        <h3>✍️ Meu Diário</h3>
        <textarea id="d-input" rows="4" placeholder="Abra seu coração..."></textarea>
    </div>

    <div class="action-row">
        <button class="btn-action btn-save" onclick="salvar()">SALVAR</button>
        <button class="btn-action btn-report" onclick="abrirRelatorio()">RELATÓRIO</button>
    </div>
</div>

<div id="modal"><div class="modal-content" id="modal-body"></div></div>

<script>
    // Gerar Dias
    const grid = document.getElementById('biblia-grid');
    for(let i=1; i<=31; i++) {
        const b = document.createElement('button'); b.className = 'btn-opt'; b.innerText = i;
        b.onclick = () => b.classList.toggle('active'); grid.appendChild(b);
    }

    // Gerar Escalas
    const escalas = ["Sono", "Humor", "Cansaço", "Descanso", "Energia"];
    const container = document.getElementById('escalas-placeholder');
    escalas.forEach(n => {
        const c = document.createElement('div'); c.className = 'card'; c.innerHTML = `<h3>${n}</h3>`;
        const g = document.createElement('div'); g.style = "display:grid; grid-template-columns:repeat(5,1fr); gap:8px;";
        for(let i=1; i<=5; i++) {
            const b = document.createElement('button'); b.className = 'btn-opt s-btn'; b.innerText = i; b.dataset.cat = n;
            b.onclick = function() { g.querySelectorAll('.btn-opt').forEach(x => x.classList.remove('active')); this.classList.add('active'); };
            g.appendChild(b);
        }
        c.appendChild(g); container.appendChild(c);
    });

    function singleSelect(btn) {
        btn.parentElement.querySelectorAll('.btn-rect').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    // Lógica de Memória
    function salvar() {
        const d = document.getElementById('data-input').value;
        const entry = {
            biblia: Array.from(document.querySelectorAll('#biblia-grid .active')).map(b => b.innerText),
            versiculo: document.getElementById('v-input').value,
            escalas: {},
            ciclo: document.querySelector('#secao-ciclo .active')?.innerText || "",
            sintomas: Array.from(document.querySelectorAll('#secao-sintomas .active')).map(b => b.innerText),
            diario: document.getElementById('d-input').value
        };
        document.querySelectorAll('.s-btn.active').forEach(b => entry.escalas[b.dataset.cat] = b.innerText);
        let db = JSON.parse(localStorage.getItem('lunabia_vfinal_fix') || "{}");
        db[d] = entry;
        localStorage.setItem('lunabia_vfinal_fix', JSON.stringify(db));
        alert("LunaBia: Salvo com sucesso! 🙏✨");
    }

    function carregarData() {
        const d = document.getElementById('data-input').value;
        const db = JSON.parse(localStorage.getItem('lunabia_vfinal_fix') || "{}");
        const log = db[d];
        document.querySelectorAll('.active').forEach(b => b.classList.remove('active'));
        document.getElementById('v-input').value = ""; document.getElementById('d-input').value = "";
        if(log) {
            document.getElementById('v-input').value = log.versiculo;
            document.getElementById('d-text' || 'd-input').value = log.diario;
            log.biblia.forEach(n => Array.from(document.querySelectorAll('#biblia-grid .btn-opt')).find(x => x.innerText == n)?.classList.add('active'));
            Object.keys(log.escalas).forEach(k => Array.from(document.querySelectorAll(`.s-btn[data-cat="${k}"]`)).find(x => x.innerText == log.escalas[k])?.classList.add('active'));
            if(log.ciclo) Array.from(document.querySelectorAll('#secao-ciclo .btn-rect')).find(x => x.innerText == log.ciclo)?.classList.add('active');
            log.sintomas.forEach(s => Array.from(document.querySelectorAll('#secao-sintomas .btn-rect')).find(x => x.innerText == s)?.classList.add('active'));
        }
    }

    function abrirRelatorio() {
        const db = JSON.parse(localStorage.getItem('lunabia_vfinal_fix') || "{}");
        const body = document.getElementById('modal-body');
        const datas = Object.keys(db).sort().reverse();
        let h = `<h2 style="font-family:'Bodoni Moda'; color:#804832; font-size:35px;">Análise LunaBia</h2>`;
        if(datas.length > 0) {
            datas.forEach(dt => {
                const item = db[dt];
                h += `<div style="border-bottom:1px solid #eee; padding:15px 0; text-align:left; font-size:12px;"><b>📅 ${dt}</b> | 🩸 Ciclo: ${item.ciclo || '-'}<br>✨ ${item.versiculo.substring(0,30)}...</div>`;
            });
        } else { h += "<p>Sem dados.</p>"; }
        h += `<button onclick="document.getElementById('modal').style.display='none'" class="btn-action btn-save" style="margin-top:20px; width:100%;">VOLTAR</button>`;
        body.innerHTML = h; document.getElementById('modal').style.display = 'block';
    }

    document.getElementById('data-input').valueAsDate = new Date();
    carregarData();
</script>
</body>
</html>
