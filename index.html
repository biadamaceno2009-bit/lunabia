<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LunaBia</title>
    <style>
        body {
            background-color: #f4ece6;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            padding: 20px;
            margin: 0;
        }
        .container {
            background-color: #fcf7f2;
            width: 100%;
            max-width: 400px;
            border-radius: 50px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            text-align: center;
        }
        h1 {
            font-family: 'Cursive', 'Brush Script MT', sans-serif;
            color: #7d4e3a;
            font-size: 55px;
            margin-bottom: 25px;
        }
        .btn-menu {
            background-color: #d4a373;
            color: white;
            border: none;
            width: 100%;
            padding: 18px;
            margin: 8px 0;
            border-radius: 20px;
            font-weight: bold;
            font-size: 15px;
            cursor: pointer;
        }
        .btn-anotacoes {
            background-color: #adc178;
        }
        .card {
            background: #fffafa;
            border-radius: 30px;
            padding: 20px;
            margin-top: 20px;
        }
        .label {
            color: #7d4e3a;
            font-weight: bold;
            font-size: 14px;
            margin-bottom: 15px;
            display: block;
        }
        .date-display {
            background: white;
            border: 1px solid #eee;
            border-radius: 15px;
            padding: 15px;
            color: #555;
        }
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
        }
        .day {
            background: white;
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            font-size: 12px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .verse-box {
            background: white;
            border-radius: 15px;
            padding: 20px;
            color: #666;
            font-style: italic;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>LunaBia</h1>

    <button class="btn-menu">💰 FINANCEIRO</button>
    <button class="btn-menu">✅ CHECK-LIST</button>
    <button class="btn-menu btn-anotacoes">📝 ANOTAÇÕES GERAIS</button>

    <div class="card">
        <span class="label">📅 DATA ATUAL</span>
        <div class="date-display">25/04/2026</div>
    </div>

    <div class="card">
        <span class="label">📖 LEITURA BÍBLICA</span>
        <div class="calendar-grid" id="calendar">
            </div>
    </div>

    <div class="card">
        <span class="label">🕊️ VERSÍCULO DO DIA</span>
        <div class="verse-box">
            "Lâmpada para os meus pés é tua palavra, e luz para o meu caminho." <br>
            <strong>Salmos 119:105</strong>
        </div>
    </div>
</div>

<script>
    const grid = document.getElementById('calendar');
    for (let i = 1; i <= 31; i++) {
        const day = document.createElement('div');
        day.className = 'day';
        day.innerText = i;
        grid.appendChild(day);
    }
</script>

</body>
</html>
