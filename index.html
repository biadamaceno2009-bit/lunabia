<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LunaBia Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --eucalipto-profundo: #2d3d36; --eucalipto-glass: rgba(45, 61, 54, 0.5); --border-glass: rgba(255, 255, 255, 0.2); }
        body { margin: 0; min-height: 100vh; font-family: 'Montserrat', sans-serif; background-image: url('1.jpeg'); background-size: cover; background-position: center; background-attachment: fixed; display: flex; justify-content: center; padding: 40px 15px; box-sizing: border-box; overflow-x: hidden; }
        .ilha-mae { background: rgba(255, 255, 255, 0.01); backdrop-filter: blur(45px) saturate(160%); width: 100%; max-width: 380px; border-radius: 65px; padding: 60px 15px; border: 1px solid var(--border-glass); text-align: center; }
        h1 { font-family: 'Cinzel', serif; color: var(--eucalipto-profundo) !important; font-size: 48px; margin: 0; letter-spacing: 5px; }
        .divider { margin: 10px auto 35px; width: 180px; opacity: 0.8; }
        .ilha-lua { background: rgba(255, 255, 255, 0.05); border-radius: 30px; padding: 18px; margin: 0 auto 40px; width: fit-content; border: 1px solid var(--border-glass); backdrop-filter: blur(20px); }
        #lua-visual { font-size: 40px; }
        #lua-nome { font-size: 9px; text-transform: uppercase; letter-spacing: 3px; color: var(--eucalipto-profundo); font-weight: 700; margin-top: 8px; }
        .ilha-filha { background: rgba(255, 255, 255, 0.05); border-radius: 40px; padding: 25px 18px; margin-bottom: 30px; border: 1px solid var(--border-glass); backdrop-filter: blur(15px); }
        .ilha-verde { background: var(--eucalipto-glass) !important; border: 1px solid rgba(255, 255, 255, 0.3) !important; }
        .ilha-clara { background: rgba(255, 255, 255, 0.15) !important; border: 1px solid rgba(255, 255, 255, 0.4) !important; }
        h3 { font-size: 10px; text-transform: uppercase; letter-spacing: 3px; color: white; font-weight: 700; margin-bottom: 15px; }
        .btn-glass-verde { background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.3); color: white; cursor: pointer; border-radius: 50%; width: 42px; height: 42px; font-weight: 700; }
        .active { background: var(--eucalipto-profundo) !important; border: 1px solid white !important; }
        .grid-icones-bia { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px 5px; }
        .container-sintoma { display: flex; flex-direction: column; align-items: center; cursor: pointer; }
        .btn-icone-bia { width: 44px; height: 44px; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 12px; display: flex; align-items: center; justify-content: center; }
        .active-icon .btn-icone-bia { background: var(--eucalipto-profundo) !important; border: 1px solid white !important; }
        .label-sintoma { font-size: 7.5px; color: white; margin-top: 5px; text-transform: uppercase; }
        textarea, input[type="date"] { width: 100%; box-sizing: border-box; background: rgba(255,255,255,0.1); border: 1px solid var(--border-glass); border-radius: 20px; padding: 18px; color: var(--eucalipto-profundo); font-weight: 600; outline: none; }
        .btn-salvar { width: 100%; padding: 22px; border-radius: 35px; border: 1px solid rgba(255,255,255,0.3); color: white; font-weight: 800; text-transform: uppercase; cursor: pointer; background: var(--eucalipto-profundo); margin-top: 10px; }

        /* MODAL RASTREADOR (ESTILO PROFISSIONAL) */
        #modal-analise { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:9999; overflow-y:auto; padding:20px; box-sizing:border-box; }
        .card-analise { background: #1a2521; border-radius: 40px; padding: 25px; width: 100%; max-width: 360px; margin: auto; border: 1px solid #333; color: white; }
        .grafico-box { background: rgba(255,255,255,0.03); border-radius: 20px; padding: 15px; margin-bottom: 20px; }
        .topo-grafico { display: flex; justify-content: space-between; margin-bottom: 10px; }
        .titulo-pilar { font-size: 11px; font-weight: 700; color: #88c0a7; text-transform: uppercase; }
        .tendencia-container { height: 70px; display: flex; align-items: flex-end; gap: 3px; border-bottom: 1px solid #333; padding-bottom: 5px; overflow-x: auto; }
        .barra-tendencia { flex: 1; min-width: 7px; background: #2d3d36; border-radius: 2px; position: relative; }
        .dia-label { font-size: 5px; color: #555; position: absolute; bottom: -12px; left: 50%; transform: translateX(-50%); }
    </style>
</head>
<body>

<div id="modal-analise">
    <div class="card-analise">
        <h2 style="font-family:'Cinzel'; text-align:center; font-size:20px; margin-bottom:20px;">Rastreador Mensal</h2>
        <div id="conteudo-rastreio"></div>
        <button class="btn-salvar" style="background:transparent; border: 1px solid #444;" onclick="document.getElementById('modal-analise').style.display='none'">Fechar</button>
    </div>
</div>

<div class="ilha-mae">
    <h1>LunaBia</h1>
    <div class="divider"><svg viewBox="0 0 100 20" fill="none"><path d="M10 10C30 10 35 18 50 18C65 18 70 10 90 10" stroke="#2d3d36" stroke-width="0.5"/><circle cx="50" cy="10" r="2.5" fill="#2d3d36"/></svg></div>
    <div class="ilha-lua"><div id="lua-visual">🌑</div><div id="lua-nome">...</div></div>
    
    <div class="ilha-filha"><h3>📅 Registro</h3><input type="date" id="data-input" onchange="carregarDia()"></div>
    <div class="ilha-filha ilha-verde"><h3>📖 Bíblia</h3><div id="grid-biblia" style="display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px;"></div></div>
    <div class="ilha-filha ilha-clara"><h3>📜 Versículo</h3><textarea id="v-input" rows="3" placeholder="Palavra de hoje..."></textarea></div>

    <div id="area-escalas"></div>

    <div class="ilha-filha ilha-verde">
        <h3>Sintomas</h3>
        <div class="grid-icones-bia">
            <div class="container-sintoma" data-sintoma="Cólica" onclick="toggleIcon(this)"><div class="btn-icone-bia">🩸</div><div class="label-sintoma">Cólica</div></div>
            <div class="container-sintoma" data-sintoma="Inchaço" onclick="toggleIcon(this)"><div class="btn-icone-bia">🎈</div><div class="label-sintoma">Inchaço</div></div>
            <div class="container-sintoma" data-sintoma="Estresse" onclick="toggleIcon(this)"><div class="btn-icone-bia">⚡</div><div class="label-sintoma">Estresse</div></div>
        </div>
    </div>

    <button class="btn-salvar" onclick="salvarDia()">Salvar Registro</button>
    <button class="btn-salvar" style="background:rgba(255,255,255,0.1); color:#2d3d36; font-size:11px;" onclick="gerarRastreador()">Ver Rastreador Completo</button>
</div>

<script>
    // Geradores e Funções de Sempre
    const pilares = ["Sono", "Humor", "Energia", "Descanso"];
    pilares.forEach(n => {
        const f = document.createElement('div'); f.className = 'ilha-filha';
        f.innerHTML = `<h3>${n}</h3><div class="grid-btns" data-pilar="${n}" style="display:flex; justify-content:space-between;"></div>`;
        const g = f.querySelector('.grid-btns');
        for(let i=1; i<=5; i++) {
            const b = document.createElement('button'); b.className = 'btn-glass-verde'; b.innerText = i;
            b.onclick = function() { g.querySelectorAll('button').forEach(x => x.classList.remove('active')); this.classList.add('active'); };
            g.appendChild(b);
        }
        document.getElementById('area-escalas').appendChild(f);
    });

    const bib = document.getElementById('grid-biblia');
    for(let i=1; i<=31; i++) {
        const b = document.createElement('button'); b.className = 'btn-glass-verde'; b.innerText = i;
        b.onclick = function() { this.classList.toggle('active'); }; bib.appendChild(b);
    }

    function toggleIcon(el) { el.classList.toggle('active-icon'); }

    function salvarDia() {
        const data = document.getElementById('data-input').value;
        const esc = {};
        document.querySelectorAll('[data-pilar]').forEach(r => esc[r.dataset.pilar] = r.querySelector('.active')?.innerText || "0");
        const obj = { escalas: esc, sintomas: Array.from(document.querySelectorAll('.active-icon')).map(i => i.dataset.sintoma), versiculo: document.getElementById('v-input').value };
        localStorage.setItem('LunaBia-' + data, JSON.stringify(obj));
        alert("Bo salvou tudo! ✨");
    }

    function carregarDia() {
        const data = document.getElementById('data-input').value;
        const s = JSON.parse(localStorage.getItem('LunaBia-' + data) || '{"escalas":{}, "sintomas":[]}');
        document.querySelectorAll('.active, .active-icon').forEach(x => x.classList.remove('active', 'active-icon'));
        for(let k in s.escalas) {
            const g = document.querySelector(`[data-pilar="${k}"]`);
            g?.querySelectorAll('button').forEach(b => { if(b.innerText == s.escalas[k]) b.classList.add('active'); });
        }
        document.getElementById('v-input').value = s.versiculo || "";
    }

    function gerarRastreador() {
        const mesAno = document.getElementById('data-input').value.substring(0, 7);
        let registros = [];
        for(let i=0; i<localStorage.length; i++) {
            const k = localStorage.key(i);
            if(k.startsWith('LunaBia-') && k.includes(mesAno)) {
                registros.push({ dia: k.split('-').pop(), d: JSON.parse(localStorage.getItem(k)) });
            }
        }
        registros.sort((a,b) => a.dia - b.dia);
        if(registros.length === 0) return alert("Selecione um mês com dados!");

        let html = "";
        pilares.forEach(p => {
            html += `<div class="grafico-box"><div class="topo-grafico"><span class="titulo-pilar">${p}</span></div><div class="tendencia-container">`;
            registros.forEach(r => {
                let v = parseInt(r.d.escalas[p] || 0);
                let h = (v / 5) * 100;
                html += `<div class="barra-tendencia" style="height:${h}%;"><span class="dia-label">${r.dia}</span></div>`;
            });
            html += `</div></div>`;
        });
        document.getElementById('conteudo-rastreio').innerHTML = html;
        document.getElementById('modal-analise').style.display = 'block';
    }

    document.getElementById('data-input').value = new Date().toISOString().split('T')[0];
    carregarDia();
</script>
</body>
</html>
