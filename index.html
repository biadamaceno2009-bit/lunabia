<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LunaBia</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Playfair+Display:ital,wght@0,700;1,700&family=Montserrat:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --eucalipto: #2d3d36; 
            --eucalipto-claro: #5a7569;
            --border: rgba(255, 255, 255, 0.25); 
            --texto-claro: rgba(255, 255, 255, 0.95);
        }
        
        body { margin: 0; min-height: 100vh; font-family: 'Montserrat', sans-serif; background-image: url('1.jpeg'); background-size: cover; background-position: center bottom; background-attachment: fixed; display: flex; justify-content: center; padding: 20px 15px; box-sizing: border-box; overflow-x: hidden; }
        
        .ilha-mae { 
            background: rgba(255, 255, 255, 0.005); 
            backdrop-filter: blur(8px) saturate(180%); 
            width: 100%; max-width: 380px; 
            border-radius: 70px; padding: 50px 15px; 
            border: 1px solid rgba(255, 255, 255, 0.15); 
            text-align: center; 
            box-shadow: 0 40px 80px rgba(0,0,0,0.3); 
            margin: auto;
        }

        h1 { font-family: 'Playfair Display', serif; font-style: italic; color: var(--eucalipto) !important; font-size: 46px; margin: 0; letter-spacing: -1px; }
        h3 { font-family: 'Cinzel', serif; font-size: 11px; text-transform: uppercase; letter-spacing: 3px; color: var(--eucalipto) !important; font-weight: 800; margin-bottom: 20px; }
        .divider { margin: 10px auto 30px; width: 160px; opacity: 0.7; }
        
        .ilha-lua { background: rgba(255, 255, 255, 0.03); border-radius: 40px; padding: 25px; margin: 0 auto 35px auto; width: fit-content; border: 1px solid var(--border); box-shadow: 10px 10px 20px rgba(0,0,0,0.15), inset 2px 2px 5px rgba(255,255,255,0.1); display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .lua-esfera-joia { width: 70px; height: 70px; border-radius: 50%; background: #f0f4f2; position: relative; overflow: hidden; border: 1px solid rgba(255,255,255,0.4); box-shadow: 0 0 15px rgba(255,255,255,0.2), inset 0 0 10px rgba(255,255,255,0.5); }
        .lua-textura-real { position: absolute; width: 100%; height: 100%; background-image: url('https://upload.wikimedia.org/wikipedia/commons/e/e1/FullMoon2010.jpg'); background-size: cover; opacity: 0.6; filter: grayscale(100%) contrast(105%); }
        .lua-sombra-orbital { position: absolute; width: 100%; height: 100%; background: rgba(45, 61, 54, 0.8); backdrop-filter: blur(3px); border-radius: 50%; transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: inset 0 0 15px rgba(0,0,0,0.2); }
        #lua-nome { font-size: 9px; font-weight: 800; color: var(--eucalipto); margin-top: 10px; text-transform: uppercase; letter-spacing: 2px; }
        
        .ilha-filha { background: rgba(255, 255, 255, 0.02); border-radius: 45px; padding: 25px 15px; margin-bottom: 30px; border: 1px solid var(--border); box-shadow: 15px 15px 30px rgba(0,0,0,0.15), inset -5px -5px 10px rgba(255,255,255,0.05), inset 5px 5px 10px rgba(0,0,0,0.05); }

        .grid-numbers { display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; justify-items: center; }
        .grid-fluxo { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        
        .btn-gv { background: rgba(255, 255, 255, 0.08); border: 1px solid rgba(255,255,255,0.1); color: var(--texto-claro); cursor: pointer; border-radius: 12px; width: 42px; height: 42px; font-weight: 600; font-size: 14px; box-shadow: 4px 4px 8px rgba(0,0,0,0.2), inset 1px 1px 2px rgba(255,255,255,0.1); transition: 0.2s; }
        .btn-fluxo { background: rgba(255, 255, 255, 0.08); border: 1px solid var(--border); color: var(--texto-claro); cursor: pointer; border-radius: 20px; padding: 12px 5px; font-weight: 600; font-size: 10px; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; }
        
        .active { background: var(--eucalipto) !important; color: white !important; box-shadow: inset 4px 4px 10px rgba(0,0,0,0.5); border: 1px solid white; transform: translateY(2px); }
        
        .grid-sintomas { display: grid; grid-template-columns: repeat(5, 1fr); gap: 15px 8px; width: 100%; justify-items: center; }
        .btn-icone-bia { width: 46px; height: 46px; background: var(--eucalipto); border: 1px solid var(--border); border-radius: 14px; display: flex; align-items: center; justify-content: center; box-shadow: 4px 4px 8px rgba(0,0,0,0.2), inset 1px 1px 2px rgba(255,255,255,0.2); }
        .btn-icone-bia img, .svg-colica { width: 26px; filter: brightness(0) invert(1); opacity: 0.9; }
        .label-sintoma { font-size: 7px; color: white; margin-top: 6px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
        .active-icon .btn-icone-bia { background: var(--eucalipto-claro) !important; border-color: white; box-shadow: inset 3px 3px 6px rgba(0,0,0,0.4); }

        textarea, input[type="date"] { width: 100%; box-sizing: border-box; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); border-radius: 25px; padding: 20px; color: var(--eucalipto); font-weight: 800; outline: none; }
        .btn-salvar { width: 100%; padding: 22px; border-radius: 40px; color: white; font-weight: 800; text-transform: uppercase; cursor: pointer; background: var(--eucalipto); margin-bottom: 12px; border: none; box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        .btn-relatorio { width: 100%; padding: 15px; border-radius: 40px; color: var(--eucalipto); font-weight: 800; text-transform: uppercase; cursor: pointer; background: transparent; border: 1.5px solid var(--eucalipto); font-size: 10px; }
    </style>
</head>
<body>

<div class="ilha-mae">
    <h1>LunaBia</h1>
    <div class="divider"><svg viewBox="0 0 100 20" fill="none"><path d="M10 10C30 10 35 18 50 18C65 18 70 10 90 10" stroke="#2d3d36" stroke-width="0.8"/><circle cx="50" cy="10" r="3" fill="#2d3d36"/></svg></div>
    
    <div class="ilha-lua"><div class="lua-esfera-joia"><div class="lua-textura-real"></div><div id="lua-sombra" class="lua-sombra-orbital"></div></div><div id="lua-nome">...</div></div>
    
    <div class="ilha-filha"><h3>📅 Registro</h3><input type="date" id="data-input" onchange="mudarData()"></div>

    <div class="ilha-filha"><h3>📖 Leitura Bíblica</h3><div id="grid-biblia" class="grid-numbers"></div></div>
    <div class="ilha-filha"><h3>📜 Versículo</h3><textarea id="v-input" rows="2" placeholder="Sua palavra hoje..."></textarea></div>

    <div id="area-escalas"></div>

    <div class="ilha-filha">
        <h3>🩸 Fluxo Menstrual</h3>
        <div class="grid-fluxo" id="area-fluxo">
            <button class="btn-fluxo" onclick="setFluxo(this)">Leve</button>
            <button class="btn-fluxo" onclick="setFluxo(this)">Moderado</button>
            <button class="btn-fluxo" onclick="setFluxo(this)">Intenso</button>
        </div>
    </div>

    <div class="ilha-filha">
        <h3>🩺 Sintomas</h3>
        <div class="grid-sintomas">
            <div class="container-sintoma" data-sintoma="Cólica" onclick="toggleIcon(this)"><div class="btn-icone-bia"><svg class="svg-colica" viewBox="0 0 100 100"><circle cx="50" cy="50" r="35" stroke="black" fill="none" stroke-width="8"/><circle cx="50" cy="50" r="18" stroke="black" fill="none" stroke-width="6"/></svg></div><div class="label-sintoma">Cólica</div></div>
            <div class="container-sintoma" data-sintoma="Inchaço" onclick="toggleIcon(this)"><div class="btn-icone-bia"><img src="inchada.png"></div><div class="label-sintoma">Inchaço</div></div>
            <div class="container-sintoma" data-sintoma="Costas" onclick="toggleIcon(this)"><div class="btn-icone-bia"><img src="dor nas costas.png"></div><div class="label-sintoma">Costas</div></div>
            <div class="container-sintoma" data-sintoma="Cabeça" onclick="toggleIcon(this)"><div class="btn-icone-bia"><img src="enxaqueca.png"></div><div class="label-sintoma">Cabeça</div></div>
            <div class="container-sintoma" data-sintoma="Rinite" onclick="toggleIcon(this)"><div class="btn-icone-bia"><img src="Renite.png"></div><div class="label-sintoma">Rinite</div></div>
            <div class="container-sintoma" data-sintoma="Estresse" onclick="toggleIcon(this)"><div class="btn-icone-bia"><img src="extressada.png"></div><div class="label-sintoma">Estresse</div></div>
            <div class="container-sintoma" data-sintoma="Desânimo" onclick="toggleIcon(this)"><div class="btn-icone-bia"><img src="desânimo.png"></div><div class="label-sintoma">Desânimo</div></div>
            <div class="container-sintoma" data-sintoma="Focada" onclick="toggleIcon(this)"><div class="btn-icone-bia"><img src="Focada.png"></div><div class="label-sintoma">Focada</div></div>
            <div class="container-sintoma" data-sintoma="Ouvido" onclick="toggleIcon(this)"><div class="btn-icone-bia"><img src="Dor de ouvido.png"></div><div class="label-sintoma">Ouvido</div></div>
            <div class="container-sintoma" data-sintoma="Cansaço" onclick="toggleIcon(this)"><div class="btn-icone-bia"><img src="cansaço.png"></div><div class="label-sintoma">Cansaço</div></div>
        </div>
    </div>

    <button class="btn-salvar" onclick="salvarDados()">Salvar Registro</button>
    <button class="btn-relatorio" onclick="gerarRelatorio()">Análise de Sintomas & Lua</button>
</div>

<script>
    const bib = document.getElementById('grid-biblia');
    for(let i=1; i<=31; i++) {
        const b = document.createElement('button'); b.className = 'btn-gv'; b.innerText = i;
        b.onclick = function() { this.classList.toggle('active'); }; bib.appendChild(b);
    }

    const escalas = ["Sono", "Humor", "Energia", "Descanso"];
    escalas.forEach(n => {
        const d = document.createElement('div'); d.className = 'ilha-filha';
        d.innerHTML = `<h3>${n}</h3><div class="btns-row grid-numbers" data-n="${n}" style="grid-template-columns: repeat(5, 1fr);"></div>`;
        const r = d.querySelector('.btns-row');
        for(let i=1; i<=5; i++) {
            const b = document.createElement('button'); b.className = 'btn-gv'; b.innerText = i;
            b.onclick = function() { r.querySelectorAll('button').forEach(x => x.classList.remove('active')); this.classList.add('active'); };
            r.appendChild(b);
        }
        document.getElementById('area-escalas').appendChild(d);
    });

    function setFluxo(btn) {
        if(btn.classList.contains('active')) btn.classList.remove('active');
        else { document.querySelectorAll('.btn-fluxo').forEach(b => b.classList.remove('active')); btn.classList.add('active'); }
    }

    function toggleIcon(el) { el.classList.toggle('active-icon'); }

    function calcularLua(dataStr) {
        const data = new Date(dataStr + "T12:00:00");
        const dia = data.getDate(); const mes = data.getMonth() + 1; let ano = data.getFullYear();
        if (mes < 3) { ano--; mes += 12; }
        let jd = (365.25 * ano) + (30.6 * (mes + 1)) + dia - 694039.09; jd /= 29.5305882;
        let fase = (jd - Math.floor(jd)) * 100;
        return { fase, nome: fase < 5 || fase > 95 ? "Nova" : (fase > 45 && fase < 55 ? "Cheia" : (fase < 50 ? "Crescente" : "Minguante")) };
    }

    function mudarData() { 
        const d = document.getElementById('data-input').value; 
        const infoLua = calcularLua(d);
        document.getElementById('lua-sombra').style.left = infoLua.fase <= 50 ? (infoLua.fase * 2) + "%" : "-" + (100 - (infoLua.fase-50)*2) + "%";
        document.getElementById('lua-nome').innerText = "Lua " + infoLua.nome;
        carregarDados(); 
    }

    function salvarDados() {
        const data = document.getElementById('data-input').value;
        const obj = { escalas: {}, sintomas: Array.from(document.querySelectorAll('.active-icon')).map(i => i.dataset.sintoma), fluxo: document.querySelector('.btn-fluxo.active')?.innerText || "Nenhum", versiculo: document.getElementById('v-input').value, biblia: Array.from(document.getElementById('grid-biblia').querySelectorAll('.active')).map(b => b.innerText), lua: calcularLua(data).nome };
        document.querySelectorAll('[data-n]').forEach(g => obj.escalas[g.dataset.n] = g.querySelector('.active')?.innerText || "0");
        localStorage.setItem('LunaBia-' + data, JSON.stringify(obj));
        alert("LunaBia atualizado! ✨");
    }

    function carregarDados() {
        const data = document.getElementById('data-input').value;
        const s = JSON.parse(localStorage.getItem('LunaBia-' + data) || '{"escalas":{},"sintomas":[],"biblia":[]}');
        document.querySelectorAll('.active, .active-icon').forEach(x => x.classList.remove('active', 'active-icon'));
        for(let k in s.escalas) {
            const g = document.querySelector(`[data-n="${k}"]`);
            g?.querySelectorAll('button').forEach(b => { if(b.innerText == s.escalas[k]) b.classList.add('active'); });
        }
        if(s.sintomas) s.sintomas.forEach(st => document.querySelector(`[data-sintoma="${st}"]`)?.classList.add('active-icon'));
        if(s.biblia) document.getElementById('grid-biblia').querySelectorAll('button').forEach(b => { if(s.biblia.includes(b.innerText)) b.classList.add('active'); });
        if(s.fluxo) document.querySelectorAll('.btn-fluxo').forEach(b => { if(b.innerText == s.fluxo) b.classList.add('active'); });
        document.getElementById('v-input').value = s.versiculo || "";
    }
    const hoje = new Date().toISOString().split('T')[0];
    document.getElementById('data-input').value = hoje;
    mudarData();
</script>
</body>
</html>
