<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LunaBia Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@1,6..96,700&family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --verde-eucalipto: #4d6d60;
            --terracota-glass: rgba(139, 69, 42, 0.75);
            --glass-filha: rgba(255, 255, 255, 0.03);
            --bege-bebe: rgba(245, 245, 220, 0.25);
            --text-light: #ffffff;
        }

        body {
            margin: 0; min-height: 100vh; font-family: 'Montserrat', sans-serif;
            background-image: url('1.jpeg'); background-size: cover;
            background-position: center; background-attachment: fixed;
            display: flex; justify-content: center; padding: 40px 15px; box-sizing: border-box;
            color: var(--text-light);
        }

        /* ILHA MÃE - CHASSI TRANSPARENTE */
        .ilha-mae {
            background: rgba(255, 255, 255, 0.01);
            backdrop-filter: blur(35px) saturate(170%);
            -webkit-backdrop-filter: blur(35px) saturate(170%);
            width: 100%; max-width: 370px; border-radius: 65px; padding: 55px 15px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.4);
            text-align: center;
        }

        /* LUNABIA - VERDE EUCALIPTO COM SOMBRA PROFUNDA */
        h1 { 
            font-family: 'Bodoni Moda', serif; font-style: italic;
            color: var(--verde-eucalipto) !important; font-size: 58px; margin: 0;
            text-shadow: 4px 6px 12px rgba(0, 0, 0, 1);
            -webkit-text-fill-color: var(--verde-eucalipto);
        }

        /* ILHA DA LUA - EFEITO NICHO ESCULPIDO */
        .ilha-lua {
            background: rgba(0, 0, 0, 0.4); border-radius: 35px;
            padding: 22px; margin: 25px auto 45px; width: 120px;
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: inset 6px 6px 15px rgba(0,0,0,0.7), 0 10px 20px rgba(0,0,0,0.3);
        }
        #lua-visual { font-size: 45px; margin-bottom: 8px; filter: drop-shadow(0 0 10px rgba(255,255,255,0.2)); }
        #lua-nome { font-size: 9px; text-transform: uppercase; letter-spacing: 3px; color: var(--verde-eucalipto); font-weight: 700; }

        /* ILHAS FILHAS - TRANSLÚCIDAS */
        .ilha-filha {
            background: var(--glass-filha); border-radius: 45px;
            padding: 25px 14px; margin-bottom: 40px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        }
        h3 { font-size: 10px; text-transform: uppercase; letter-spacing: 3.5px; margin: 0 0 20px 0; color: var(--verde-eucalipto); font-weight: 700; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); }

        /* ILHAS BEBÊS - BEGE GLASS LEITOSO */
        .ilha-bebe {
            background: var(--bege-bebe); border-radius: 30px;
            padding: 22px; border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(8px);
            box-shadow: inset 0 0 15px rgba(255,255,255,0.1);
        }

        /* BOTÕES INTERNOS */
        .btn-glass {
            background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.3);
            cursor: pointer; color: white; font-weight: 700; transition: all 0.3s;
        }
        .btn-opt { border-radius: 50%; width: 42px; height: 42px; font-size: 13px; }
        .btn-rect { border-radius: 18px; padding: 16px 8px; font-size: 10px; text-transform: uppercase; width: 100%; letter-spacing: 1px; }

        .active { 
            background: linear-gradient(135deg, #f7e7ce, #d4af37) !important; color: #3d2b1f !important;
            border: none !important; transform: translateY(-5px);
            box-shadow: 0 12px 25px rgba(212, 175, 55, 0.5);
        }

        textarea, input[type="date"] {
            width: 100%; box-sizing: border-box; background: rgba(255,255,255,0.12);
            border: 1px solid rgba(255,255,255,0.25); border-radius: 20px; padding: 18px;
            color: white; font-family: inherit; font-size: 16px; outline: none;
        }

        /* BOTÕES FINAIS - TERRACOTA GLASS */
        .action-row { display: flex; gap: 15px; margin-top: 10px; }
        .btn-action { 
            flex: 1; padding: 24px; border-radius: 35px; border: 1px solid rgba(255,255,255,0.2);
            color: white; font-weight: 800; text-transform: uppercase; font-size: 13px;
            backdrop-filter: blur(15px); box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        .btn-save { background: var(--terracota-glass); }
        .btn-report { background: rgba(110, 130, 110, 0.7); }

        #modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.92); backdrop-filter: blur(30px); z-index: 9999; padding: 20px; box-sizing: border-box; }
        .modal-body { background: #fffcfb; border-radius: 55px; padding: 45px 30px; max-width: 360px; margin: auto; color: #3d2b1f; text-align: center; }
    </style>
</head>
<body>

<div class="ilha-mae">
    <h1>LunaBia</h1>
    
    <div class="ilha-lua">
        <div id="lua-visual">🌑</div>
        <div id="lua-nome">Carregando...</div>
    </div>

    <div class="ilha-filha">
        <h3>📅 Momento</h3>
        <div class="ilha-bebe"><input type="date" id="data-input" onchange="carregarData()"></div>
    </div>

    <div class="ilha-filha">
        <h3>📖 Leitura Bíblica</h3>
        <div class="ilha-bebe">
            <div id="grid-biblia" style="display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px;"></div>
        </div>
    </div>

    <div class="ilha-filha">
        <h3>✨ Versículo</h3>
        <div class="ilha-bebe"><textarea id="v-input" rows="2" placeholder="O que o Pai revelou?"></textarea></div>
    </div>

    <div id="area-escalas"></div>

    <div class="ilha-filha">
        <h3>🩸 Ciclo Menstrual</h3>
        <div class="ilha-bebe">
            <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px;">
                <button class="btn-glass btn-rect" onclick="soUm(this)">Leve</button>
                <button class="btn-glass btn-rect" onclick="soUm(this)">Mod.</button>
                <button class="btn-glass btn-rect" onclick="soUm(this)">Int.</button>
            </div>
        </div>
    </div>

    <div class="ilha-filha">
        <h3>🤒 Sintomas</h3>
        <div class="ilha-bebe">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
                <button class="btn-glass btn-rect" onclick="this.classList.toggle('active')">Cólica</button>
                <button class="btn-glass btn-rect" onclick="this.classList.toggle('active')">Inchaço</button>
                <button class="btn-glass btn-rect" onclick="this.classList.toggle('active')">D. Cabeça</button>
                <button class="btn-glass btn-rect" onclick="this.classList.toggle('active')">D. Costas</button>
                <button class="btn-glass btn-rect" onclick="this.classList.toggle('active')">Rinite</button>
                <button class="btn-glass btn-rect" onclick="this.classList.toggle('active')">Insônia</button>
            </div>
        </div>
    </div>

    <div class="ilha-filha">
        <h3>✍️ Diário</h3>
        <div class="ilha-bebe"><textarea id="d-input" rows="5" placeholder="Abra seu coração..."></textarea></div>
    </div>

    <div class="action-row">
        <button class="btn-action btn-save" onclick="salvar()">SALVAR</button>
        <button class="btn-action btn-report" onclick="abrirRelatorio()">REGISTROS</button>
    </div>
</div>

<div id="modal"><div class="modal-body" id="m-content"></div></div>

<script>
    // LÓGICA DA LUA AUTOMÁTICA
    function updateMoon() {
        const date = new Date();
        const lp = 2551443; 
        const new_moon = new Date('1970-01-07T20:35:00Z').getTime();
        const phase = ((date.getTime() - new_moon) / 1000) % lp;
        const days = phase / (24 * 3600);
        let res = { emoji: '🌑', nome: 'Lua Nova' };
        if (days < 1.84) res = { emoji: '🌑', nome: 'Lua Nova' };
        else if (days < 5.53) res = { emoji: '🌒', nome: 'Crescente' };
        else if (days < 9.22) res = { emoji: '🌓', nome: 'Quarto Crescente' };
        else if (days < 12.91) res = { emoji: '🌔', nome: 'Gibosa Crescente' };
        else if (days < 16.61) res = { emoji: '🌕', nome: 'Lua Cheia' };
        else if (days < 20.30) res = { emoji: '🌖', nome: 'Gibosa Minguante' };
        else if (days < 23.99) res = { emoji: '🌗', nome: 'Quarto Minguante' };
        else if (days < 27.68) res = { emoji: '🌘', nome: 'Lua Minguante' };
        document.getElementById('lua-visual').innerText = res.emoji;
        document.getElementById('lua-nome').innerText = res.nome;
    }

    // GRID BÍBLICO
    const bib = document.getElementById('grid-biblia');
    for(let i=1; i<=31; i++) {
        const b = document.createElement('button'); b.className = 'btn-glass btn-opt'; b.innerText = i;
        b.onclick = () => b.classList.toggle('active'); bib.appendChild(b);
    }

    // ESCALAS
    const nomes = ["Sono", "Humor", "Cansaço", "Descanso", "Energia"];
    const area = document.getElementById('area-escalas');
    nomes.forEach(n => {
        const f = document.createElement('div'); f.className = 'ilha-filha'; f.innerHTML = `<h3>${n}</h3>`;
        const b = document.createElement('div'); b.className = 'ilha-bebe';
        const g = document.createElement('div'); g.style = "display:grid; grid-template-columns:repeat(5, 1fr); gap:10px;";
        for(let i=1; i<=5; i++) {
            const bt = document.createElement('button'); bt.className = 'btn-glass btn-opt s-btn'; bt.innerText = i; bt.dataset.cat = n;
            bt.onclick = function() { g.querySelectorAll('.btn-opt').forEach(x => x.classList.remove('active')); this.classList.add('active'); };
            g.appendChild(bt);
        }
        b.appendChild(g); f.appendChild(b); area.appendChild(f);
    });

    function soUm(btn) {
        btn.parentElement.querySelectorAll('.btn-rect').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    function salvar() {
        const d = document.getElementById('data-input').value;
        const entry = {
            biblia: Array.from(document.querySelectorAll('#grid-biblia .active')).map(b => b.innerText),
            versiculo: document.getElementById('v-input').value,
            diario: document.getElementById('d-input').value,
            sintomas: Array.from(document.querySelectorAll('.ilha-filha .active')).map(b => b.innerText)
        };
        localStorage.setItem('lunabia_pro_v1_' + d, JSON.stringify(entry));
        alert("LunaBia Pro: Registro guardado com sucesso! ✨🌿");
    }

    function carregarData() {
        const d = document.getElementById('data-input').value;
        const log = JSON.parse(localStorage.getItem('lunabia_pro_v1_' + d));
        document.querySelectorAll('.active').forEach(b => b.classList.remove('active'));
        if(log) {
            document.getElementById('v-input').value = log.versiculo;
            document.getElementById('d-input').value = log.diario;
        }
    }

    function abrirRelatorio() {
        document.getElementById('m-content').innerHTML = `<h3>Em breve</h3><p>Histórico completo em desenvolvimento.</p><button onclick="document.getElementById('modal').style.display='none'" class="btn-action btn-save" style="width:100%;">VOLTAR</button>`;
        document.getElementById('modal').style.display = 'block';
    }

    document.getElementById('data-input').valueAsDate = new Date();
    updateMoon();
    carregarData();
</script>
</body>
</html>
