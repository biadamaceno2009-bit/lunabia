<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LunaBia</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --terracota-grad: linear-gradient(135deg, #b87355, #804832);
            --text-brown: #5c3b2e;
        }

        body {
            margin: 0; min-height: 100vh; font-family: 'Montserrat', sans-serif;
            background-image: url('papeldeparede.png'); background-size: cover;
            background-position: center; background-attachment: fixed;
            display: flex; justify-content: center; padding: 20px 15px; box-sizing: border-box;
        }

        /* ILHA MÃE - VIDRO LÍQUIDO */
        .container {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            width: 100%; max-width: 450px; border-radius: 50px; padding: 35px 15px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-top: 2px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.15);
            text-align: center;
        }

        /* LOGO COM NOVA FONTE */
        h1 { 
            font-family: 'Playfair Display', serif; 
            font-style: italic;
            color: #7a422d; 
            font-size: 55px; 
            margin: 0 0 25px 0;
            letter-spacing: -1px;
            text-shadow: 2px 2px 10px rgba(255,255,255,0.5);
        }

        .card {
            background: rgba(255, 255, 255, 0.05); border-radius: 25px; padding: 20px;
            margin-bottom: 22px; border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.05);
        }

        h3 { color: var(--text-brown); text-transform: uppercase; font-size: 10px; margin-bottom: 15px; letter-spacing: 2px; font-weight: 700; opacity: 0.8; }

        .grid-layout { display: grid; gap: 8px; justify-content: center; }
        .grid-7 { grid-template-columns: repeat(7, 1fr); }
        .grid-5 { grid-template-columns: repeat(5, 1fr); }
        .grid-3 { grid-template-columns: repeat(3, 1fr); }
        .grid-wrap { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }

        .btn-opt, .btn-rect {
            background: rgba(255, 255, 255, 0.3); border: 1px solid rgba(255, 255, 255, 0.4);
            cursor: pointer; color: var(--text-brown); font-weight: 600; transition: 0.3s ease;
        }

        .btn-opt { border-radius: 50%; width: 36px; height: 36px; font-size: 12px; }
        .btn-rect { border-radius: 14px; padding: 12px 10px; font-size: 11px; text-transform: uppercase; }

        .active { background: var(--terracota-grad) !important; color: white !important; border: none; transform: scale(1.1); box-shadow: 0 5px 15px rgba(128,72,50,0.3); }

        textarea, input[type="date"] {
            width: 100%; box-sizing: border-box; background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.3); border-radius: 18px; padding: 14px;
            color: #4a3728; font-family: inherit; font-size: 14px; outline: none;
        }

        .action-row { display: flex; gap: 12px; margin-top: 15px; }
        .btn-action { flex: 1; padding: 20px; border-radius: 25px; border: none; color: white; font-weight: 700; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; }
        .btn-save { background: var(--terracota-grad); }
        .btn-report { background: linear-gradient(135deg, #a8c1a9, #7a9d7e); color: #1e2b1f; }

        /* MODAL RELATÓRIO ANALÍTICO */
        #relatorio-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(15px); z-index: 1000;
            padding: 20px; box-sizing: border-box; overflow-y: auto;
        }
        .rel-content { background: #fffcf9; border-radius: 40px; padding: 30px 20px; max-width: 500px; margin: auto; color: #333; }
        .analise-box { background: #fdf2ed; border-radius: 20px; padding: 20px; margin-bottom: 25px; text-align: left; border-left: 6px solid #b87355; }
        .log-item { border-bottom: 1px solid #eee; padding: 15px 0; text-align: left; font-size: 12px; }
    </style>
</head>
<body>

<div class="container">
    <h1>LunaBia</h1>

    <div class="card">
        <h3>📅 Data do Registro</h3>
        <input type="date" id="data-input">
    </div>

    <div class="card">
        <h3>📖 Leitura Bíblica</h3>
        <div class="grid-layout grid-7" id="grid-biblia"></div>
    </div>

    <div class="card">
        <h3>✨ Versículo do Dia</h3>
        <textarea id="texto-versiculo" rows="2" placeholder="O que o Senhor falou?"></textarea>
    </div>

    <div id="container-escalas"></div>

    <div class="card" id="secao-ciclo">
        <h3>🩸 Ciclo Menstrual</h3>
        <div class="grid-layout grid-3">
            <button class="btn-rect" onclick="singleSelect(this)">Leve</button>
            <button class="btn-rect" onclick="singleSelect(this)">Moderado</button>
            <button class="btn-rect" onclick="singleSelect(this)">Intenso</button>
        </div>
    </div>

    <div class="card" id="secao-sintomas">
        <h3>🤒 Sintomas</h3>
        <div class="grid-wrap">
            <button class="btn-rect" onclick="this.classList.toggle('active')">Cólica</button>
            <button class="btn-rect" onclick="this.classList.toggle('active')">Inchaço</button>
            <button class="btn-rect" onclick="this.classList.toggle('active')">Dor nas costas</button>
            <button class="btn-rect" onclick="this.classList.toggle('active')">Está tudo bem</button>
            <button class="btn-rect" onclick="this.classList.toggle('active')">Dor de cabeça</button>
            <button class="btn-rect" onclick="this.classList.toggle('active')">Insônia</button>
        </div>
    </div>

    <div class="card">
        <h3>✍️ Meu Diário</h3>
        <textarea id="texto-diario" rows="4" placeholder="Abra seu coração aqui..."></textarea>
    </div>

    <div class="action-row">
        <button class="btn-action btn-save" onclick="salvar()">SALVAR</button>
        <button class="btn-action btn-report" onclick="gerarRelatorio()">RELATÓRIO</button>
    </div>
</div>

<div id="relatorio-modal">
    <div class="rel-content">
        <h2 style="font-family: 'Playfair Display'; font-style: italic; font-size: 35px; color: #804832;">Análise Inteligente</h2>
        <div id="box-analise"></div>
        <div id="lista-logs"></div>
        <button onclick="document.getElementById('relatorio-modal').style.display='none'" class="btn-action btn-save" style="margin-top:20px">VOLTAR</button>
    </div>
</div>

<script>
    // Iniciar Bíblia
    const biblia = document.getElementById('grid-biblia');
    for(let i=1; i<=31; i++) {
        const b = document.createElement('button'); b.className = 'btn-opt'; b.innerText = i;
        b.onclick = () => b.classList.toggle('active'); biblia.appendChild(b);
    }

    // Iniciar Escalas
    const nomesEscalas = ["Sono", "Humor", "Cansaço", "Descanso", "Energia"];
    const containerE = document.getElementById('container-escalas');
    nomesEscalas.forEach(n => {
        const card = document.createElement('div'); card.className = 'card';
        card.innerHTML = `<h3>${n}</h3>`;
        const grid = document.createElement('div'); grid.className = 'grid-layout grid-5';
        for(let i=1; i<=5; i++) {
            const btn = document.createElement('button'); btn.className = 'btn-opt scale-btn';
            btn.innerText = i; btn.dataset.cat = n;
            btn.onclick = function() {
                grid.querySelectorAll('.btn-opt').forEach(x => x.classList.remove('active'));
                this.classList.add('active');
            };
            grid.appendChild(btn);
        }
        card.appendChild(grid); containerE.appendChild(card);
    });

    function singleSelect(btn) {
        btn.parentElement.querySelectorAll('.btn-rect').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    function salvar() {
        const entry = {
            data: document.getElementById('data-input').value,
            biblia: Array.from(document.querySelectorAll('#grid-biblia .active')).map(b => b.innerText),
            versiculo: document.getElementById('texto-versiculo').value,
            escalas: {},
            ciclo: document.querySelector('#secao-ciclo .active')?.innerText || "",
            sintomas: Array.from(document.querySelectorAll('#secao-sintomas .active')).map(b => b.innerText),
            diario: document.getElementById('texto-diario').value
        };
        document.querySelectorAll('.scale-btn.active').forEach(b => entry.escalas[b.dataset.cat] = b.innerText);

        let logs = JSON.parse(localStorage.getItem('lunabia_db') || "[]");
        logs.unshift(entry);
        localStorage.setItem('lunabia_db', JSON.stringify(logs));
        alert("LunaBia: Salvo com sucesso! ✨");
    }

    function gerarRelatorio() {
        const logs = JSON.parse(localStorage.getItem('lunabia_db') || "[]");
        const box = document.getElementById('box-analise');
        const lista = document.getElementById('lista-logs');

        if(logs.length === 0) {
            box.innerHTML = "Ainda não há dados para analisar, Bia!";
            return;
        }

        // Cálculos
        let somaMood = 0, somaSono = 0, count = logs.length;
        let lastCiclo = null;
        logs.forEach(l => {
            somaMood += parseInt(l.escalas.Humor || 0);
            somaSono += parseInt(l.escalas.Sono || 0);
            if(l.ciclo && !lastCiclo) lastCiclo = new Date(l.data);
        });

        let previsaoStr = "Continue registrando para prever seu ciclo.";
        if(lastCiclo) {
            let p = new Date(lastCiclo); p.setDate(p.getDate() + 28);
            previsaoStr = `Próximo ciclo estimado: <b>${p.toLocaleDateString('pt-BR')}</b>`;
        }

        box.innerHTML = `
            <div class="analise-box">
                <b>📊 Médias da Semana:</b><br>
                Humor: ${(somaMood/count).toFixed(1)} | Sono: ${(somaSono/count).toFixed(1)}<br><br>
                <b>🩸 Previsão:</b><br>
                ${previsaoStr}<br><br>
                <b>💡 Insight do Bo:</b><br>
                ${somaSono/count < 3 ? "Bia, notei que seu sono está baixo. Que tal um chá e desligar o celular mais cedo hoje?" : "Sua rotina está ótima, continue firme!"}
            </div>
        `;

        lista.innerHTML = logs.map(l => `
            <div class="log-item">
                <b>${l.data}</b> - Bíblia: ${l.biblia.join(',') || '-'}<br>
                Escalas: H:${l.escalas.Humor || '-'} S:${l.escalas.Sono || '-'} E:${l.escalas.Energia || '-'}<br>
                Sintomas: ${l.sintomas.join(', ') || 'Nenhum'}
            </div>
        `).join('');

        document.getElementById('relatorio-modal').style.display = 'block';
    }

    document.getElementById('data-input').valueAsDate = new Date();
</script>
</body>
</html>
