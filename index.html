<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LunaBia Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --eucalipto: #2d3d36; --glass: rgba(255, 255, 255, 0.05); --border: rgba(255, 255, 255, 0.2); }
        body { margin: 0; min-height: 100vh; font-family: 'Montserrat', sans-serif; background-image: url('1.jpeg'); background-size: cover; background-position: center; background-attachment: fixed; display: flex; justify-content: center; padding: 40px 15px; box-sizing: border-box; overflow-x: hidden; }
        
        .ilha-mae { background: rgba(255, 255, 255, 0.01); backdrop-filter: blur(45px) saturate(160%); -webkit-backdrop-filter: blur(45px) saturate(160%); width: 100%; max-width: 380px; border-radius: 65px; padding: 60px 15px; border: 1px solid var(--border); text-align: center; box-shadow: 0 30px 60px rgba(0,0,0,0.4); }
        h1 { font-family: 'Cinzel', serif; color: var(--eucalipto) !important; font-size: 48px; margin: 0; letter-spacing: 5px; }
        .divider { margin: 10px auto 35px; width: 180px; opacity: 0.8; }
        
        .ilha-lua { background: var(--glass); border-radius: 30px; padding: 18px; margin: 0 auto 40px; width: fit-content; border: 1px solid var(--border); backdrop-filter: blur(20px); }
        #lua-visual { font-size: 40px; line-height: 1; }
        #lua-nome { font-size: 9px; text-transform: uppercase; letter-spacing: 3px; color: var(--eucalipto); font-weight: 700; margin-top: 8px; }
        
        .ilha-filha { background: var(--glass); border-radius: 40px; padding: 25px 18px; margin-bottom: 30px; border: 1px solid var(--border); backdrop-filter: blur(15px); }
        h3 { font-size: 10px; text-transform: uppercase; letter-spacing: 3px; margin: 0 0 20px 0; color: white; font-weight: 700; }
        
        .btn-gv { background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.3); color: white; cursor: pointer; border-radius: 50%; width: 42px; height: 42px; font-weight: 700; font-size: 12px; transition: 0.3s; }
        .active { background: var(--eucalipto) !important; border: 1px solid white !important; transform: translateY(3px); }
        
        .grid-sintomas { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px 5px; width: 100%; justify-items: center; }
        .container-sintoma { display: flex; flex-direction: column; align-items: center; gap: 5px; cursor: pointer; }
        .btn-icone-bia { width: 44px; height: 44px; background: var(--glass); border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 12px; display: flex; align-items: center; justify-content: center; transition: 0.3s; }
        .btn-icone-bia img, .svg-colica { width: 26px; height: 26px; filter: brightness(0) invert(1); opacity: 0.8; }
        .label-sintoma { font-size: 7.5px; color: rgba(255,255,255,0.7); font-weight: 600; text-transform: uppercase; }
        .active-icon .btn-icone-bia { background: var(--eucalipto) !important; border: 1px solid white !important; }
        
        textarea, input[type="date"] { width: 100%; box-sizing: border-box; background: rgba(255,255,255,0.1); border: 1px solid var(--border); border-radius: 20px; padding: 18px; color: var(--eucalipto); font-family: inherit; font-size: 15px; font-weight: 600; outline: none; }
        .btn-salvar { width: 100%; padding: 22px; border-radius: 35px; border: 1px solid rgba(255,255,255,0.3); color: white; font-weight: 800; text-transform: uppercase; cursor: pointer; background: var(--eucalipto); margin-top: 10px; }

        /* MODAL DO RASTREADOR ANALÍTICO */
        #modal-analise { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:9999; overflow-y:auto; padding:20px; box-sizing:border-box; }
        .card-analise { background: #1a2521; border-radius: 45px; padding: 25px; width:100%; max-width:360px; margin: auto; border: 1px solid #333; color: white; }
        .grafico-box { background: rgba(255,255,255,0.03); border-radius: 25px; padding: 15px; margin-bottom: 20px; }
        .topo-grafico { display: flex; justify-content: space-between; margin-bottom: 10px; }
        .titulo-pilar { font-size: 11px; font-weight: 700; color: #88c0a7; text-transform: uppercase; }
        .tendencia-container { height: 70px; display: flex; align-items: flex-end; gap: 3px; border-bottom: 1px solid #333; padding-bottom: 5px; overflow-x: auto; }
        .barra-tendencia { flex: 1; min-width: 7px; background: var(--eucalipto); border-radius: 2px; position: relative; }
        .dia-label { position: absolute; bottom: -12px; left: 50%; transform: translateX(-50%); font-size: 5px; color: #555; }
    </style>
</head>
<body>

<div id="modal-analise">
    <div class="card-analise">
        <h2 id="titulo-rastreador" style="font-family:'Cinzel'; text-align:center; font-size:20px; margin-bottom:20px;">Rastreador Mensal</h2>
        <div id="conteudo-rastreio"></div>
        <button class="btn-salvar" style="background:transparent; border: 1px solid #444;" onclick="document.getElementById('modal-analise').style.display='none'">Fechar Painel</button>
    </div>
</div>

<div class="ilha-mae">
    <h1>LunaBia</h1>
    <div class="divider"><svg viewBox="0 0 100 20" fill="none"><path d="M10 10C30 10 35 18 50 18C65 18 70 10 90 10" stroke="#2d3d36" stroke-width="0.5"/><circle cx="50" cy="10" r="2.5" fill="#2d3d36"/></svg></div>
    
    <div class="ilha-lua"><div id="lua-visual">🌑</div><div id="lua-nome">...</div></div>
    
    <div class="ilha-filha"><h3>📅 Registro</h3><input type="date" id="data-input" onchange="mudarData()"></div>
    
    <div class="ilha-filha"><h3>📖 Leitura Bíblica</h3><div id="grid-biblia" style="display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px;"></div></div>

    <div class="ilha-filha"><h3>📜 Versículo</h3><textarea id="v-input" rows="3" placeholder="Palavra de hoje..."></textarea></div>

    <div id="area-escalas"></div>

    <div class="ilha-filha">
        <h3>Sintomas</h3>
        <div class="grid-sintomas">
            <div class="container-sintoma" data-sintoma="Cólica" onclick="toggleIcon(this)"><div class="btn-icone-bia"><svg class="svg-colica" viewBox="0 0 100 100"><circle cx="50" cy="50" r="35" stroke="black" fill="none" stroke-width="6"/><circle cx="50" cy="50" r="18" stroke="black" fill="none" stroke-width="5"/></svg></div><div class="label-sintoma">Cólica</div></div>
            <div class="container-sintoma" data-sintoma="Inchaço" onclick="toggleIcon(this)"><div class="btn-icone-bia"><img src="inchada.png"></div><div class="label-sintoma">Inchaço</div></div>
            <div class="container-sintoma" data-sintoma="Costas" onclick="toggleIcon(this)"><div class="btn-icone-bia"><img src="dor nas costas.png"></div><div class="label-sintoma">Costas</div></div>
            <div class="container-sintoma" data-sintoma="Cabeça" onclick="toggleIcon(this)"><div class="btn-icone-bia"><img src="enxaqueca.png"></div><div class="label-sintoma">Cabeça</div></div>
            <div class="container-sintoma" data-sintoma="Rinite" onclick="toggleIcon(this)"><div class="btn-icone-bia"><img src="Renite.png"></div><div class="label-sintoma">Rinite</div></div>
            <div class="container-sintoma" data-sintoma="Estresse" onclick="toggleIcon(this)"><div class="btn-icone-bia"><img src="extressada.png"></div><div class="label-sintoma">Estresse</div></div>
            <div class="container-sintoma" data-sintoma="Desânimo" onclick="toggleIcon(this)"><div class="btn-icone-bia"><img src="desânimo.png"></div><div class="label-sintoma">Desânimo</div></div>
            <div class="container-sintoma" data-sintoma="Focada" onclick="toggleIcon(this)"><div class="btn-icone-bia"><img src="Focada.png"></div><div class="label-sintoma">Focada</div></div>
            <div class="container-sintoma" data-sintoma="Ouvido" onclick="toggleIcon(this)"><div class="btn-icone-bia"><img src="Dor de ouvido.png"></div><div class="label-sintoma">Ouvido</div></div>
            <div class="container-sintoma" data-sintoma="Cansaço" onclick="toggleIcon(this)"><div class="btn-icone-bia"><img src="cansaço.png"></div><div class="label-sintoma">Cansaço</div></div>
        </div>
    </div>

    <button class="btn-salvar" onclick="salvarDados()">Salvar Registro</button>
    <button class="btn-salvar" style="background:rgba(255,255,255,0.1); color:var(--eucalipto); font-size:11px;" onclick="gerarRastreador()">Gerar Rastreador Analítico</button>
</div>

<script>
    const bib = document.getElementById('grid-biblia');
    for(let i=1; i<=31; i++) {
        const b = document.createElement('button'); b.className = 'btn-gv'; b.innerText = i;
        b.onclick = function() { this.classList.toggle('active'); }; bib.appendChild(b);
    }

    const escalas = ["Sono", "Humor", "Energia", "Descanso"];
    escalas.forEach(n => {
        const d = document.createElement('div'); d.className = 'ilha-filha';
        d.innerHTML = `<h3>${n}</h3><div class="btns-row" data-n="${n}" style="display:flex; justify-content:space-between;"></div>`;
        const r = d.querySelector('.btns-row');
        for(let i=1; i<=5; i++) {
            const b = document.createElement('button'); b.className = 'btn-gv'; b.innerText = i;
            b.onclick = function() { r.querySelectorAll('button').forEach(x => x.classList.remove('active')); this.classList.add('active'); };
            r.appendChild(b);
        }
        document.getElementById('area-escalas').appendChild(d);
    });

    function toggleIcon(el) { el.classList.toggle('active-icon'); }

    function atualizarFaseDaLua(dataStr) {
        const data = new Date(dataStr + "T12:00:00");
        const dia = data.getDate(); const mes = data.getMonth() + 1; let ano = data.getFullYear();
        if (mes < 3) { ano--; mes += 12; }
        let c = 365.25 * ano; let e = 30.6 * (mes + 1);
        let jd = c + e + dia - 694039.09; jd /= 29.5305882;
        let b = parseInt(jd); jd -= b;
        let f = Math.round(jd * 8); if (f >= 8) f = 0;
        const fases = [
            {n:"Nova", i:"🌑"}, {n:"Crescente", i:"🌒"}, {n:"Quarto Crescente", i:"🌓"}, {n:"Crescente Gibosa", i:"🌔"},
            {n:"Cheia", i:"🌕"}, {n:"Minguante Gibosa", i:"🌖"}, {n:"Quarto Minguante", i:"🌗"}, {n:"Minguante", i:"🌘"}
        ];
        document.getElementById('lua-visual').innerText = fases[f].i;
        document.getElementById('lua-nome').innerText = "Lua " + fases[f].n;
    }

    function mudarData() {
        const data = document.getElementById('data-input').value;
        atualizarFaseDaLua(data);
        carregarDados();
    }

    function salvarDados() {
        const data = document.getElementById('data-input').value;
        const esc = {};
        document.querySelectorAll('[data-n]').forEach(g => esc[g.dataset.n] = g.querySelector('.active')?.innerText || "0");
        const obj = { 
            escalas: esc, 
            sintomas: Array.from(document.querySelectorAll('.active-icon')).map(i => i.dataset.sintoma), 
            versiculo: document.getElementById('v-input').value,
            biblia: Array.from(document.getElementById('grid-biblia').querySelectorAll('.active')).map(b => b.innerText)
        };
        localStorage.setItem('LunaBia-' + data, JSON.stringify(obj));
        alert("Bo salvou tudo! ✨");
    }

    function carregarDados() {
        const data = document.getElementById('data-input').value;
        const s = JSON.parse(localStorage.getItem('LunaBia-' + data) || '{"escalas":{},"sintomas":[],"biblia":[]}');
        document.querySelectorAll('.active, .active-icon').forEach(x => x.classList.remove('active', 'active-icon'));
        for(let k in s.escalas) {
            const g = document.querySelector(`[data-n="${k}"]`);
            g?.querySelectorAll('button').forEach(b => { if(b.innerText == s.escalas[k]) b.classList.add('active'); });
        }
        if(s.sintomas) s.sintomas.forEach(st => document.querySelector(`[data-sintoma="${st}"]`)?.classList.add('active-icon'));
        if(s.biblia) {
            document.getElementById('grid-biblia').querySelectorAll('button').forEach(b => {
                if(s.biblia.includes(b.innerText)) b.classList.add('active');
            });
        }
        document.getElementById('v-input').value = s.versiculo || "";
    }

    function gerarRastreador() {
        const mesAno = document.getElementById('data-input').value.substring(0, 7);
        let registros = [];
        for(let i=0; i<localStorage.length; i++) {
            const k = localStorage.key(i);
            if(k.startsWith('LunaBia-') && k.includes(mesAno)) {
                registros.push({ dia: k.split('-').pop(), d: JSON.parse(localStorage.getItem(k)) });
            }
        }
        registros.sort((a,b) => a.dia - b.dia);
        if(registros.length === 0) return alert("Selecione um mês com dados!");

        let html = "";
        escalas.forEach(p => {
            html += `<div class="grafico-box"><span class="titulo-pilar">${p}</span><div class="tendencia-container">`;
            registros.forEach(r => {
                let v = parseInt(r.d.escalas[p] || 0);
                html += `<div class="barra-tendencia" style="height:${(v/5)*100}%"><span class="dia-label">${r.dia}</span></div>`;
            });
            html += `</div></div>`;
        });
        document.getElementById('conteudo-rastreio').innerHTML = html;
        document.getElementById('modal-analise').style.display = 'block';
    }

    const hoje = new Date().toISOString().split('T')[0];
    document.getElementById('data-input').value = hoje;
    atualizarFaseDaLua(hoje);
    carregarDados();
</script>
</body>
</html>
