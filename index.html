<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LunaBia</title>
    <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@1,6..96,700&family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --champagne: #f7e7ce;
            --terracota-viva: rgba(139, 69, 42, 0.45);
            --bege-glass: rgba(245, 245, 220, 0.35);
            --text-dark: #3d2b1f;
            --gold-btn: linear-gradient(135deg, #f7e7ce, #d4af37);
        }

        body {
            margin: 0; min-height: 100vh; font-family: 'Montserrat', sans-serif;
            background-image: url('1.jpeg'); background-size: cover;
            background-position: center; background-attachment: fixed;
            display: flex; justify-content: center; padding: 40px 15px; box-sizing: border-box;
            overflow-x: hidden;
        }

        /* ILHA MÃE */
        .ilha-mae {
            background: rgba(255, 255, 255, 0.01);
            backdrop-filter: blur(30px) saturate(160%);
            -webkit-backdrop-filter: blur(30px) saturate(160%);
            width: 100%; max-width: 370px; border-radius: 60px; padding: 50px 15px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.4);
            text-align: center;
        }

        h1 { 
            font-family: 'Bodoni Moda', serif; font-style: italic;
            color: var(--champagne); font-size: 58px; margin: 0;
            /* Sombra escura e profunda */
            text-shadow: 4px 5px 15px rgba(0, 0, 0, 0.8);
        }

        /* ILHA DA LUA COM PROFUNDIDADE */
        .ilha-lua {
            background: rgba(0, 0, 0, 0.15); border-radius: 30px;
            padding: 18px; margin: 20px auto 40px; width: fit-content;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: inset 3px 3px 12px rgba(0,0,0,0.5), 0 8px 20px rgba(0,0,0,0.3);
        }
        .lua-shape { width: 35px; height: 35px; border-radius: 50%; background: #f0f0f0; margin: auto; box-shadow: inset -5px -3px 10px rgba(0,0,0,0.2), 0 0 20px var(--champagne); }

        /* ILHA FILHA (TERRACOTA) */
        .ilha-filha {
            background: var(--terracota-viva); border-radius: 40px;
            padding: 22px 14px; margin-bottom: 35px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 12px 25px rgba(0,0,0,0.2);
        }
        h3 { font-size: 10px; text-transform: uppercase; letter-spacing: 3px; margin: 0 0 18px 0; color: var(--champagne); font-weight: 700; text-shadow: 2px 2px 4px rgba(0,0,0,0.4); }

        /* ILHA BEBÊ (BEGE TRANSLÚCIDA) */
        .ilha-bebe {
            background: var(--bege-glass); border-radius: 28px;
            padding: 20px; border: 1px solid rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(12px);
            box-shadow: inset 0 0 15px rgba(255,255,255,0.15), 0 5px 15px rgba(0,0,0,0.1);
        }

        /* BOTÕES */
        .btn-glass {
            background: rgba(255, 255, 255, 0.2); border: 1px solid rgba(255, 255, 255, 0.4);
            cursor: pointer; color: white; font-weight: 700;
            transition: all 0.3s; box-shadow: 0 5px 12px rgba(0,0,0,0.15);
        }
        .btn-opt { border-radius: 50%; width: 38px; height: 38px; font-size: 12px; }
        .btn-rect { border-radius: 16px; padding: 14px 6px; font-size: 10px; text-transform: uppercase; width: 100%; }

        .active { 
            background: var(--gold-btn) !important; color: var(--text-dark) !important;
            border: none !important; transform: translateY(-4px) scale(1.05);
            box-shadow: 0 12px 25px rgba(212, 175, 55, 0.5);
        }

        textarea, input[type="date"] {
            width: 100%; box-sizing: border-box; background: rgba(255,255,255,0.25);
            border: 1px solid rgba(255,255,255,0.4); border-radius: 20px; padding: 15px;
            color: white; font-family: inherit; font-size: 15px; outline: none;
        }
        textarea::placeholder { color: rgba(255,255,255,0.7); }

        .action-row { display: flex; gap: 15px; margin-top: 20px; padding-bottom: 20px; }
        .btn-action { flex: 1; padding: 22px; border-radius: 30px; border: none; color: white; font-weight: 700; text-transform: uppercase; font-size: 13px; box-shadow: 0 15px 30px rgba(0,0,0,0.3); }
        .btn-save { background: linear-gradient(135deg, #b87355, #804832); }
        .btn-report { background: linear-gradient(135deg, #a8c1a9, #7a9d7e); color: #1a261b; }

        #modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(25px); z-index: 9999; padding: 20px; box-sizing: border-box; }
        .modal-body { background: #fffcfb; border-radius: 50px; padding: 40px 25px; max-width: 360px; margin: auto; }
    </style>
</head>
<body>

<div class="ilha-mae">
    <h1>LunaBia</h1>
    
    <div class="ilha-lua">
        <div class="lua-shape"></div>
        <div style="font-size: 9px; text-transform: uppercase; letter-spacing: 2px; margin-top:8px; opacity: 0.7; color: white;">Devocional</div>
    </div>

    <div class="ilha-filha">
        <h3>📅 Momento</h3>
        <div class="ilha-bebe">
            <input type="date" id="data-input" onchange="carregarData()">
        </div>
    </div>

    <div class="ilha-filha">
        <h3>📖 Leitura Bíblica</h3>
        <div class="ilha-bebe">
            <div id="grid-biblia" style="display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px;"></div>
        </div>
    </div>

    <div class="ilha-filha">
        <h3>✨ Versículo</h3>
        <div class="ilha-bebe">
            <textarea id="v-input" rows="2" placeholder="O Senhor me disse..."></textarea>
        </div>
    </div>

    <div id="area-escalas"></div>

    <div class="ilha-filha">
        <h3>🩸 Ciclo Menstrual</h3>
        <div class="ilha-bebe">
            <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px;">
                <button class="btn-glass btn-rect" onclick="soUm(this)">Leve</button>
                <button class="btn-glass btn-rect" onclick="soUm(this)">Mod.</button>
                <button class="btn-glass btn-rect" onclick="soUm(this)">Int.</button>
            </div>
        </div>
    </div>

    <div class="ilha-filha">
        <h3>🤒 Sintomas</h3>
        <div class="ilha-bebe">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <button class="btn-glass btn-rect" onclick="this.classList.toggle('active')">Cólica</button>
                <button class="btn-glass btn-rect" onclick="this.classList.toggle('active')">Inchaço</button>
                <button class="btn-glass btn-rect" onclick="this.classList.toggle('active')">D. Cabeça</button>
                <button class="btn-glass btn-rect" onclick="this.classList.toggle('active')">D. Costas</button>
                <button class="btn-glass btn-rect" onclick="this.classList.toggle('active')">Rinite</button>
                <button class="btn-glass btn-rect" onclick="this.classList.toggle('active')">Insônia</button>
            </div>
        </div>
    </div>

    <div class="ilha-filha">
        <h3>✍️ Diário</h3>
        <div class="ilha-bebe">
            <textarea id="d-input" rows="4" placeholder="Abra seu coração..."></textarea>
        </div>
    </div>

    <div class="action-row">
        <button class="btn-action btn-save" onclick="salvar()">SALVAR</button>
        <button class="btn-action btn-report" onclick="abrirRelatorio()">RELATÓRIO</button>
    </div>
</div>

<div id="modal"><div class="modal-body" id="m-content"></div></div>

<script>
    const bib = document.getElementById('grid-biblia');
    for(let i=1; i<=31; i++) {
        const b = document.createElement('button'); b.className = 'btn-glass btn-opt'; b.innerText = i;
        b.onclick = () => b.classList.toggle('active'); bib.appendChild(b);
    }

    const nomes = ["Sono", "Humor", "Cansaço", "Descanso", "Energia"];
    const area = document.getElementById('area-escalas');
    nomes.forEach(n => {
        const f = document.createElement('div'); f.className = 'ilha-filha'; f.innerHTML = `<h3>${n}</h3>`;
        const b = document.createElement('div'); b.className = 'ilha-bebe';
        const g = document.createElement('div'); g.style = "display:grid; grid-template-columns:repeat(5, 1fr); gap:8px;";
        for(let i=1; i<=5; i++) {
            const bt = document.createElement('button'); bt.className = 'btn-glass btn-opt s-btn'; bt.innerText = i; bt.dataset.cat = n;
            bt.onclick = function() { g.querySelectorAll('.btn-opt').forEach(x => x.classList.remove('active')); this.classList.add('active'); };
            g.appendChild(bt);
        }
        b.appendChild(g); f.appendChild(b); area.appendChild(f);
    });

    function soUm(btn) {
        btn.parentElement.querySelectorAll('.btn-rect').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    function salvar() {
        const d = document.getElementById('data-input').value;
        const entry = {
            biblia: Array.from(document.querySelectorAll('#grid-biblia .active')).map(b => b.innerText),
            versiculo: document.getElementById('v-input').value,
            escalas: {},
            sintomas: Array.from(document.querySelectorAll('.ilha-filha:nth-child(7) .active')).map(b => b.innerText),
            diario: document.getElementById('d-input').value
        };
        document.querySelectorAll('.s-btn.active').forEach(b => entry.escalas[b.dataset.cat] = b.innerText);
        localStorage.setItem('lunabia_pro_' + d, JSON.stringify(entry));
        alert("LunaBia: Guardado com luz! ✨🙏");
    }

    function carregarData() {
        const d = document.getElementById('data-input').value;
        const log = JSON.parse(localStorage.getItem('lunabia_pro_' + d));
        document.querySelectorAll('.active').forEach(b => b.classList.remove('active'));
        if(log) {
            document.getElementById('v-input').value = log.versiculo;
            document.getElementById('d-input').value = log.diario;
            log.biblia.forEach(n => Array.from(document.querySelectorAll('#grid-biblia .btn-opt')).find(x => x.innerText == n)?.classList.add('active'));
            Object.keys(log.escalas).forEach(k => Array.from(document.querySelectorAll(`.s-btn[data-cat="${k}"]`)).find(x => x.innerText == log.escalas[k])?.classList.add('active'));
        }
    }

    function abrirRelatorio() {
        const modal = document.getElementById('m-content');
        modal.innerHTML = `<h2 style="font-family:'Bodoni Moda';">Em breve</h2><button onclick="document.getElementById('modal').style.display='none'" class="btn-action btn-save" style="width:100%;">FECHAR</button>`;
        document.getElementById('modal').style.display = 'block';
    }

    document.getElementById('data-input').valueAsDate = new Date();
    carregarData();
</script>
</body>
</html>
