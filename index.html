<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LunaBia</title>
    <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@1,6..96,700&family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* Cor de Ativo: Dourado Champagne Luxo */
            --active-color: linear-gradient(135deg, #f7e7ce, #d4af37);
            --text-dark: #5c3b2e;
        }

        body {
            margin: 0; min-height: 100vh; font-family: 'Montserrat', sans-serif;
            background-image: url('papeldeparede.png'); background-size: cover;
            background-position: center; background-attachment: fixed;
            display: flex; justify-content: center; padding: 30px 15px; box-sizing: border-box;
            color: var(--text-dark);
        }

        /* CONTAINER MÃE - APENAS UM CAMPO DE DESFOQUE */
        .container {
            background: rgba(255, 255, 255, 0.01);
            width: 100%; max-width: 450px; 
            text-align: center;
            display: flex; flex-direction: column;
        }

        /* LOGO VENICE NIGHTS STYLE */
        h1 { 
            font-family: 'Bodoni Moda', serif; font-style: italic;
            color: #7a422d; font-size: 58px; margin: 0;
            letter-spacing: -2px;
            text-shadow: 2px 2px 20px rgba(255,255,255,0.4);
        }

        /* ILHAS FILHAS - TOTALMENTE FLUTUANTES E DESPRENDIDAS (EFEITO GLASS) */
        .card {
            background: rgba(255, 255, 255, 0.02); 
            border-radius: 35px; padding: 25px;
            margin-bottom: 35px; /* Espaço para não parecer fixo */
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-top: 2px solid rgba(255, 255, 255, 0.6); /* Brilho superior */
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            /* Sombra profunda que dá o efeito de "desprendido" */
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.15), inset 0 0 10px rgba(255,255,255,0.1);
            transition: all 0.3s ease;
        }

        h3 { color: var(--text-dark); text-transform: uppercase; font-size: 9px; margin-bottom: 18px; letter-spacing: 3px; font-weight: 700; opacity: 0.6; }

        /* LUA REALISTA COM TEXTURA */
        .real-moon {
            width: 70px; height: 70px; border-radius: 50%;
            background: #d1d1d1;
            position: relative; overflow: hidden;
            box-shadow: inset -10px -10px 20px rgba(0,0,0,0.2), 0 0 20px rgba(255,255,255,0.4);
            background-image: 
                radial-gradient(circle at 20% 30%, #b5b5b5 10%, transparent 12%),
                radial-gradient(circle at 60% 20%, #b5b5b5 8%, transparent 10%),
                radial-gradient(circle at 40% 70%, #b5b5b5 12%, transparent 15%),
                radial-gradient(circle at 80% 60%, #b5b5b5 6%, transparent 8%);
            margin: 0 auto 10px auto;
        }

        /* BOTÕES COM EFEITO GLASS (RESTALRADO) */
        .btn-opt, .btn-rect {
            background: rgba(255, 255, 255, 0.1); 
            border: 1px solid rgba(255, 255, 255, 0.3);
            cursor: pointer; color: var(--text-dark); font-weight: 600; 
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            box-shadow: 0 6px 15px rgba(0,0,0,0.06);
            backdrop-filter: blur(5px);
        }
        .btn-opt { border-radius: 50%; width: 38px; height: 38px; font-size: 11px; }
        .btn-rect { border-radius: 18px; padding: 14px; font-size: 10px; text-transform: uppercase; letter-spacing: 1px; }

        /* CLIQUE DOURADO CHAMPAGNE (EFEITO LUXO) */
        .active { 
            background: var(--active-color) !important; 
            color: #5c3b2e !important; 
            border: none; 
            transform: scale(1.1) translateY(-4px);
            box-shadow: 0 12px 25px rgba(212, 175, 55, 0.45);
        }

        /* INPUTS GLASS LÍQUIDO */
        textarea, input[type="date"] {
            width: 100%; box-sizing: border-box; background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 20px; padding: 16px;
            color: var(--text-dark); font-family: inherit; font-size: 14px; outline: none;
        }
        textarea:focus { background: rgba(255,255,255,0.12); border-color: rgba(255,255,255,0.4); }

        .action-row { display: flex; gap: 15px; margin-top: 10px; }
        .btn-action { 
            flex: 1; padding: 22px; border-radius: 30px; border: none; color: white; 
            font-weight: 700; cursor: pointer; text-transform: uppercase; letter-spacing: 1px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15); transition: 0.3s;
        }
        .btn-save { background: linear-gradient(135deg, #b87355, #804832); }
        .btn-report { background: linear-gradient(135deg, #a8c1a9, #7a9d7e); color: #1a261b; }
        .btn-action:active { transform: scale(0.96); }

        /* MODAL RELATÓRIO */
        #modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(25px); z-index: 9999; padding: 20px; box-sizing: border-box; overflow-y: auto;}
        .modal-body { background: #fffcfb; border-radius: 50px; padding: 40px 25px; max-width: 450px; margin: auto; color: #333;}
    </style>
</head>
<body>

<div class="container">
    <h1>LunaBia</h1>

    <div class="card">
        <div class="real-moon"></div>
        <div style="font-size: 10px; letter-spacing: 3px; text-transform: uppercase; opacity: 0.6; font-weight: 700;">Quarto Minguante</div>
    </div>

    <div class="card">
        <h3>📅 Data do Registro</h3>
        <input type="date" id="data-main" onchange="carregarHistorico()">
    </div>

    <div class="card">
        <h3>📖 Leitura Bíblica</h3>
        <div id="grid-biblia" style="display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px;"></div>
    </div>

    <div class="card">
        <h3>✨ Versículo do Dia</h3>
        <textarea id="v-text" rows="2" placeholder="O que o Senhor falou hoje?"></textarea>
    </div>

    <div id="area-escalas"></div>

    <div class="card" id="card-ciclo">
        <h3>🩸 Ciclo Menstrual</h3>
        <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px;">
            <button class="btn-rect" onclick="singleChoice(this)">Leve</button>
            <button class="btn-rect" onclick="singleChoice(this)">Moderado</button>
            <button class="btn-rect" onclick="singleChoice(this)">Intenso</button>
        </div>
    </div>

    <div class="card" id="card-sintomas">
        <h3>🤒 Sintomas</h3>
        <div style="display: flex; flex-wrap: wrap; gap: 8px; justify-content: center;">
            <button class="btn-rect" onclick="this.classList.toggle('active')">Cólica</button>
            <button class="btn-rect" onclick="this.classList.toggle('active')">Inchaço</button>
            <button class="btn-rect" onclick="this.classList.toggle('active')">Dor nas costas</button>
            <button class="btn-rect" onclick="this.classList.toggle('active')">Está tudo bem</button>
            <button class="btn-rect" onclick="this.classList.toggle('active')">Dor de cabeça</button>
            <button class="btn-rect" onclick="this.classList.toggle('active')">Insônia</button>
        </div>
    </div>

    <div class="card">
        <h3>✍️ Meu Diário</h3>
        <textarea id="d-text" rows="4" placeholder="Abra seu coração..."></textarea>
    </div>

    <div class="action-row">
        <button class="btn-action btn-save" onclick="salvarDados()">SALVAR</button>
        <button class="btn-action btn-report" onclick="gerarRelatorio()">RELATÓRIO</button>
    </div>
</div>

<div id="modal"><div class="modal-body" id="modal-content"></div></div>

<script>
    // Gerar Dias
    const bib = document.getElementById('grid-biblia');
    for(let i=1; i<=31; i++) {
        const b = document.createElement('button'); b.className = 'btn-opt'; b.innerText = i;
        b.onclick = () => b.classList.toggle('active'); bib.appendChild(b);
    }

    // Gerar Escalas
    const nomes = ["Sono", "Humor", "Cansaço", "Descanso", "Energia"];
    nomes.forEach(n => {
        const c = document.createElement('div'); c.className = 'card'; c.innerHTML = `<h3>${n}</h3>`;
        const g = document.createElement('div'); g.style = "display:grid; grid-template-columns:repeat(5,1fr); gap:8px;";
        for(let i=1; i<=5; i++) {
            const b = document.createElement('button'); b.className = 'btn-opt sc-btn'; b.innerText = i; b.dataset.cat = n;
            b.onclick = function() { g.querySelectorAll('.btn-opt').forEach(x => x.classList.remove('active')); this.classList.add('active'); };
            g.appendChild(b);
        }
        c.appendChild(g); document.getElementById('area-escalas').appendChild(c);
    });

    function singleChoice(btn) {
        btn.parentElement.querySelectorAll('.btn-rect').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    // LÓGICA DE DADOS (MEMÓRIA POR DATA)
    function salvarDados() {
        const data = document.getElementById('data-main').value;
        const entry = {
            biblia: Array.from(document.querySelectorAll('#grid-biblia .active')).map(b => b.innerText),
            versiculo: document.getElementById('v-text').value,
            escalas: {},
            ciclo: document.querySelector('#card-ciclo .active')?.innerText || "",
            sintomas: Array.from(document.querySelectorAll('#card-sintomas .active')).map(b => b.innerText),
            diario: document.getElementById('d-text').value
        };
        document.querySelectorAll('.sc-btn.active').forEach(b => entry.escalas[b.dataset.cat] = b.innerText);
        let banco = JSON.parse(localStorage.getItem('lunabia_vfinal_fix2') || "{}");
        banco[data] = entry;
        localStorage.setItem('lunabia_vfinal_fix2', JSON.stringify(banco));
        alert("LunaBia: Salvo com sucesso! 🙏✨");
    }

    function carregarHistorico() {
        const data = document.getElementById('data-main').value;
        const banco = JSON.parse(localStorage.getItem('lunabia_vfinal_fix2') || "{}");
        const dia = banco[data];
        document.querySelectorAll('.active').forEach(b => b.classList.remove('active'));
        document.getElementById('v-text').value = ""; document.getElementById('d-text').value = "";
        if(dia) {
            document.getElementById('v-text').value = dia.versiculo;
            document.getElementById('d-text').value = dia.diario;
            dia.biblia.forEach(n => Array.from(document.querySelectorAll('#grid-biblia .btn-opt')).find(x => x.innerText == n)?.classList.add('active'));
            Object.keys(dia.escalas).forEach(k => Array.from(document.querySelectorAll(`.sc-btn[data-cat="${k}"]`)).find(x => x.innerText == dia.escalas[k])?.classList.add('active'));
            if(dia.ciclo) Array.from(document.querySelectorAll('#card-ciclo .btn-rect')).find(x => x.innerText == dia.ciclo)?.classList.add('active');
            dia.sintomas.forEach(s => Array.from(document.querySelectorAll('#card-sintomas .btn-rect')).find(x => x.innerText == s)?.classList.add('active'));
        }
    }

    function gerarRelatorio() {
        const banco = JSON.parse(localStorage.getItem('lunabia_vfinal_fix2') || "{}");
        const cont = document.getElementById('modal-content');
        const datas = Object.keys(banco).sort().reverse();
        let html = `<h2 style="font-family:'Bodoni Moda'; font-style:italic; color:#804832; font-size:40px; margin-top:0;">Histórico LunaBia</h2>`;
        if(datas.length > 0) {
            datas.forEach(d => {
                const log = banco[d];
                html += `<div style="border-bottom:1px solid #eee; padding:15px 0; text-align:left; font-size:12px;"><b>📅 ${d}</b> | 🩸 Ciclo: ${log.ciclo || '-'}<br>✨ Versículo: ${log.versiculo.substring(0,35)}...</div>`;
            });
        } else { html += "<p>Ainda não há registros, Bia.</p>"; }
        html += `<button onclick="document.getElementById('modal').style.display='none'" class="btn-action btn-save" style="margin-top:20px; width:100%;">VOLTAR</button>`;
        cont.innerHTML = html;
        document.getElementById('modal').style.display = 'block';
    }

    document.getElementById('data-main').valueAsDate = new Date();
    carregarHistorico();
</script>
</body>
</html>
