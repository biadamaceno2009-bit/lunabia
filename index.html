<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LunaBia Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --eucalipto-profundo: #2d3d36;
            --eucalipto-glass-escuro: rgba(45, 61, 54, 0.5); 
            --border-glass: rgba(255, 255, 255, 0.2);
        }

        body { margin: 0; min-height: 100vh; font-family: 'Montserrat', sans-serif; background-image: url('1.jpeg'); background-size: cover; background-position: center; background-attachment: fixed; display: flex; justify-content: center; padding: 40px 15px; box-sizing: border-box; overflow-x: hidden; }
        
        .ilha-mae { background: rgba(255, 255, 255, 0.01); backdrop-filter: blur(45px) saturate(160%); -webkit-backdrop-filter: blur(45px) saturate(160%); width: 100%; max-width: 380px; border-radius: 65px; padding: 60px 15px; border: 1px solid var(--border-glass); text-align: center; box-shadow: 0 30px 60px rgba(0,0,0,0.3); }
        
        h1 { font-family: 'Cinzel', serif; color: var(--eucalipto-profundo) !important; font-size: 48px; margin: 0; letter-spacing: 5px; }
        
        .divider { margin: 10px auto 35px; width: 180px; opacity: 0.8; }
        
        .ilha-lua { background: rgba(255, 255, 255, 0.05); border-radius: 30px; padding: 18px; margin: 0 auto 40px; width: fit-content; border: 1px solid var(--border-glass); backdrop-filter: blur(20px); }
        
        #lua-visual { font-size: 40px; }
        #lua-nome { font-size: 9px; text-transform: uppercase; letter-spacing: 3px; color: var(--eucalipto-profundo); font-weight: 700; margin-top: 8px; }

        .ilha-filha { background: rgba(255, 255, 255, 0.05); border-radius: 40px; padding: 25px 18px; margin-bottom: 40px; border: 1px solid var(--border-glass); backdrop-filter: blur(15px); box-shadow: 0 15px 35px rgba(0,0,0,0.2); }
        
        .ilha-verde { background: var(--eucalipto-glass-escuro) !important; border: 1px solid rgba(255, 255, 255, 0.3) !important; }

        h3 { font-size: 10px; text-transform: uppercase; letter-spacing: 3px; margin: 0 0 20px 0; color: white; font-weight: 700; }

        /* BOTÕES DE ESCALA E CICLO */
        .btn-glass-verde, .btn-rect-glass { background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.3); color: white; cursor: pointer; transition: 0.3s; backdrop-filter: blur(10px); }
        .btn-glass-verde { border-radius: 50%; width: 46px; height: 46px; font-weight: 700; }
        .btn-rect-glass { border-radius: 18px; padding: 16px; font-weight: 700; text-transform: uppercase; font-size: 10px; }
        .active { background: var(--eucalipto-profundo) !important; border: 1px solid white !important; transform: scale(1.05); }

        /* ESTILO TRANSPARENTE PARA OS SEUS ÍCONES */
        .grid-icones-bia { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; justify-items: center; }

        .btn-icone-bia {
            width: 55px; height: 55px; 
            background: rgba(255, 255, 255, 0.08); /* Vidro bem clarinho */
            border: 1px solid rgba(255, 255, 255, 0.2); 
            border-radius: 15px;
            display: flex; align-items: center; justify-content: center; 
            cursor: pointer; transition: all 0.3s ease;
        }

        .btn-icone-bia img { width: 38px; height: 38px; object-fit: contain; transition: 0.3s; }

        /* QUANDO VOCÊ CLICA NO ÍCONE */
        .active-icon { 
            background: rgba(255, 255, 255, 0.2) !important; 
            border: 2px solid white !important; 
            box-shadow: 0 0 15px rgba(255,255,255,0.3);
            transform: translateY(-3px);
        }

        textarea, input[type="date"] { width: 100%; box-sizing: border-box; background: rgba(255,255,255,0.05); border: 1px solid var(--border-glass); border-radius: 20px; padding: 18px; color: white; font-family: inherit; font-size: 16px; outline: none; }
        
        .area-acoes { margin-top: 20px; display: flex; flex-direction: column; gap: 15px; }
        .btn-salvar { width: 100%; padding: 25px; border-radius: 35px; border: 1px solid rgba(255,255,255,0.3); color: white; font-weight: 800; text-transform: uppercase; font-size: 13px; background: var(--eucalipto-glass-escuro); }
        .btn-hist { width: 100%; padding: 20px; border-radius: 35px; border: 1px solid rgba(255,255,255,0.1); color: rgba(255,255,255,0.7); text-transform: uppercase; font-size: 11px; background: rgba(255,255,255,0.03); }
    </style>
</head>
<body>

<div class="ilha-mae">
    <h1>LunaBia</h1>
    <div class="divider"><svg viewBox="0 0 100 20" fill="none"><path d="M10 10C30 10 35 18 50 18C65 18 70 10 90 10" stroke="#2d3d36" stroke-width="0.5"/><circle cx="50" cy="10" r="2.5" fill="#2d3d36"/></svg></div>
    
    <div class="ilha-lua">
        <div id="lua-visual">🌑</div>
        <div id="lua-nome">...</div>
    </div>

    <div class="ilha-filha">
        <h3>📅 Registro</h3>
        <input type="date" id="data-input">
    </div>

    <div class="ilha-filha ilha-verde">
        <h3>📖 Leitura Bíblica</h3>
        <div id="grid-biblia" style="display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px;"></div>
    </div>

    <div id="area-escalas"></div>

    <div class="ilha-filha ilha-verde">
        <h3>🩹 Monitoramento & Cuidado</h3>
        <div class="grid-icones-bia">
            <div class="btn-icone-bia" onclick="toggleIcon(this)" title="Cansaço"><img src="cansaço.png"></div>
            <div class="btn-icone-bia" onclick="toggleIcon(this)" title="Inchada"><img src="inchada.png"></div>
            <div class="btn-icone-bia" onclick="toggleIcon(this)" title="Dor nas Costas"><img src="dor nas costas.png"></div>
            <div class="btn-icone-bia" onclick="toggleIcon(this)" title="Enxaqueca"><img src="enxaqueca.png"></div>
            <div class="btn-icone-bia" onclick="toggleIcon(this)" title="Rinite"><img src="Renite.png"></div>
            <div class="btn-icone-bia" onclick="toggleIcon(this)" title="Estressada"><img src="extressada.png"></div>
            <div class="btn-icone-bia" onclick="toggleIcon(this)" title="Desânimo"><img src="desânimo.png"></div>
            <div class="btn-icone-bia" onclick="toggleIcon(this)" title="Focada"><img src="Focada.png"></div>
            <div class="btn-icone-bia" onclick="toggleIcon(this)" title="Ouvido"><img src="Dor de ouvido.png"></div>
            <div class="btn-icone-bia" onclick="toggleIcon(this)" title="Cuidado Íntimo"><img src="co.png"></div>
        </div>
    </div>

    <div class="ilha-filha">
        <h3>✍️ Diário</h3>
        <textarea id="d-input" rows="4" placeholder="Abra seu coração..."></textarea>
    </div>

    <div class="area-acoes">
        <button class="btn-salvar" onclick="salvar()">Salvar no Diário</button>
        <button class="btn-hist" onclick="alert('Analisando padrões...')">Analisar Padrões</button>
    </div>
</div>

<script>
    function updateMoon() {
        const dataIn = document.getElementById('data-input').value;
        const date = dataIn ? new Date(dataIn + "T12:00:00") : new Date();
        const lp = 2551443; const new_m = new Date('1970-01-07T20:35:00Z').getTime();
        const phase = ((date.getTime() - new_m) / 1000) % lp; const days = phase / (24 * 3600);
        let res = { emoji: '🌑', nome: 'Lua Nova' };
        if (days < 1.84) res = { emoji: '🌑', nome: 'Lua Nova' };
        else if (days < 5.53) res = { emoji: '🌒', nome: 'Crescente' };
        else if (days < 9.22) res = { emoji: '🌓', nome: 'Quarto Crescente' };
        else if (days < 12.91) res = { emoji: '🌔', nome: 'Gibosa Crescente' };
        else if (days < 16.61) res = { emoji: '🌕', nome: 'Lua Cheia' };
        else if (days < 20.30) res = { emoji: '🌖', nome: 'Gibosa Minguante' };
        else if (days < 23.99) res = { emoji: '🌗', nome: 'Quarto Minguante' };
        else if (days < 27.68) res = { emoji: '🌘', nome: 'Lua Minguante' };
        document.getElementById('lua-visual').innerText = res.emoji;
        document.getElementById('lua-nome').innerText = res.nome;
    }
    document.getElementById('data-input').addEventListener('change', updateMoon);
    window.onload = updateMoon;

    const bib = document.getElementById('grid-biblia');
    for(let i=1; i<=31; i++) {
        const b = document.createElement('button'); b.className = 'btn-glass-verde'; b.innerText = i;
        b.onclick = () => b.classList.toggle('active'); bib.appendChild(b);
    }

    const nomes = ["Sono", "Humor", "Energia"];
    const area = document.getElementById('area-escalas');
    nomes.forEach(n => {
        const f = document.createElement('div'); f.className = 'ilha-filha'; f.innerHTML = `<h3>${n}</h3>`;
        const g = document.createElement('div'); g.style = "display:grid; grid-template-columns:repeat(5, 1fr); gap:12px;";
        for(let i=1; i<=5; i++) {
            const bt = document.createElement('button'); bt.className = 'btn-glass-verde'; bt.innerText = i;
            bt.onclick = function() { g.querySelectorAll('.btn-glass-verde').forEach(x => x.classList.remove('active')); this.classList.add('active'); };
            g.appendChild(bt);
        }
        f.appendChild(g); area.appendChild(f);
    });

    function toggleIcon(el) { el.classList.toggle('active-icon'); }

    function salvar() {
        const registro = {
            data: document.getElementById('data-input').value,
            lua: document.getElementById('lua-nome').innerText,
            diario: document.getElementById('d-input').value,
            icones: Array.from(document.querySelectorAll('.active-icon')).map(i => i.getAttribute('title'))
        };
        let hist = JSON.parse(localStorage.getItem('lunaBia_dados')) || [];
        hist.push(registro);
        localStorage.setItem('lunaBia_dados', JSON.stringify(hist));
        alert("Salvo com sucesso! ✨🌙");
    }
</script>
</body>
</html>
