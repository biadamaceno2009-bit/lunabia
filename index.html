<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LunaBia Analytics Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --eucalipto-profundo: #2d3d36; --eucalipto-glass: rgba(45, 61, 54, 0.6); --border-glass: rgba(255, 255, 255, 0.2); }
        body { margin: 0; min-height: 100vh; font-family: 'Montserrat', sans-serif; background-image: url('1.jpeg'); background-size: cover; background-position: center; background-attachment: fixed; display: flex; justify-content: center; padding: 20px 15px; box-sizing: border-box; }
        .ilha-mae { background: rgba(255, 255, 255, 0.01); backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px); width: 100%; max-width: 380px; border-radius: 60px; padding: 40px 15px; border: 1px solid var(--border-glass); text-align: center; }
        h1 { font-family: 'Cinzel', serif; color: var(--eucalipto-profundo); font-size: 38px; margin: 0; letter-spacing: 4px; }
        .ilha-filha { background: rgba(255, 255, 255, 0.1); border-radius: 30px; padding: 20px; margin-bottom: 20px; border: 1px solid var(--border-glass); }
        h3 { font-size: 10px; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 15px; color: white; }
        .btn-glass { background: rgba(255, 255, 255, 0.1); border: 1px solid var(--border-glass); color: white; border-radius: 50%; width: 40px; height: 40px; cursor: pointer; }
        .active { background: var(--eucalipto-profundo) !important; border: 1px solid white !important; }
        .active-icon { background: var(--eucalipto-profundo) !important; border-radius: 15px; }
        .btn-acao { width: 100%; padding: 18px; border-radius: 30px; border: none; color: white; font-weight: 700; text-transform: uppercase; margin-top: 10px; cursor: pointer; }
        .btn-salvar { background: var(--eucalipto-glass); }
        .btn-relatorio { background: rgba(255,255,255,0.15); font-size: 11px; }

        /* Modal Analítico */
        #modal-relatorio { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:2000; overflow-y:auto; padding:20px; box-sizing:border-box; }
        .card-analise { background:#f4f7f5; border-radius:40px; padding:25px; width:100%; max-width:350px; margin:auto; color: var(--eucalipto-profundo); }
        .box-grafico { background: white; border-radius: 20px; padding: 15px; margin-bottom: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .analise-texto { font-size: 13px; line-height: 1.6; text-align: left; padding: 10px; background: #eef2ef; border-radius: 15px; border-left: 4px solid var(--eucalipto-profundo); }
    </style>
</head>
<body>

<div id="modal-relatorio">
    <div class="card-analise">
        <h2 style="font-family:'Cinzel'; text-align:center;">Relatório Bo ✨</h2>
        
        <div class="box-grafico">
            <h4 style="font-size:11px; text-align:center;">📊 MÉDIAS DO MÊS</h4>
            <canvas id="chartBarras"></canvas>
        </div>

        <div class="box-grafico">
            <h4 style="font-size:11px; text-align:center;">🩺 SINAIS DO CORPO</h4>
            <div id="lista-sintomas" style="font-size:12px; text-align:left;"></div>
        </div>

        <div class="box-grafico">
            <h4 style="font-size:11px; text-align:center;">🌙 ANÁLISE LUNAR & CICLO</h4>
            <div id="analise-bo" class="analise-texto"></div>
        </div>

        <button class="btn-acao btn-salvar" onclick="fecharRelatorio()">Fechar</button>
    </div>
</div>

<div class="ilha-mae">
    <h1>LunaBia</h1>
    <div class="ilha-filha">
        <h3>📅 Selecionar Data</h3>
        <input type="date" id="data-input" onchange="carregarDados()">
    </div>

    <div id="container-escalas"></div>

    <div class="ilha-filha" id="sessao-sintomas">
        <h3>Sintomas</h3>
        <div style="display:grid; grid-template-columns: repeat(5, 1fr); gap:10px;" id="grid-sintomas-icons">
            <button class="btn-glass" onclick="toggleSintoma(this, 'Cólica')">🩸</button>
            <button class="btn-glass" onclick="toggleSintoma(this, 'Inchaço')">🎈</button>
            <button class="btn-glass" onclick="toggleSintoma(this, 'Costas')">🦴</button>
            <button class="btn-glass" onclick="toggleSintoma(this, 'Cabeça')">🧠</button>
            <button class="btn-glass" onclick="toggleSintoma(this, 'Estresse')">⚡</button>
        </div>
    </div>

    <button class="btn-acao btn-salvar" onclick="salvar()">Salvar Dia</button>
    <button class="btn-relatorio btn-acao" onclick="abrirRelatorio()">Análise Brilhante</button>
</div>

<script>
    const escalas = ["Sono", "Humor", "Energia", "Descanso"];
    const container = document.getElementById('container-escalas');
    escalas.forEach(esc => {
        const div = document.createElement('div'); div.className = 'ilha-filha';
        div.innerHTML = `<h3>${esc}</h3><div class="grid-btns" data-escala="${esc}" style="display:flex; justify-content:space-between;"></div>`;
        const grid = div.querySelector('.grid-btns');
        for(let i=1; i<=5; i++){
            const b = document.createElement('button'); b.className = 'btn-glass'; b.innerText = i;
            b.onclick = function() { grid.querySelectorAll('button').forEach(x => x.classList.remove('active')); this.classList.add('active'); };
            grid.appendChild(b);
        }
        container.appendChild(div);
    });

    function toggleSintoma(btn, nome) { btn.classList.toggle('active-icon'); btn.dataset.nome = nome; }

    function getLua(data) {
        const lp = 2551443; const new_m = new Date('1970-01-07T20:35:00Z').getTime();
        const d = new Date(data + "T12:00:00").getTime();
        const phase = ((d - new_m) / 1000) % lp; const days = phase / (24 * 3600);
        if (days < 1.84 || days > 27.67) return "Nova";
        if (days < 9.22) return "Crescente";
        if (days < 16.61) return "Cheia";
        return "Minguante";
    }

    function salvar() {
        const data = document.getElementById('data-input').value;
        const obj = { escalas: {}, sintomas: [], lua: getLua(data) };
        document.querySelectorAll('[data-escala]').forEach(g => {
            obj.escalas[g.dataset.escala] = g.querySelector('.active')?.innerText || "0";
        });
        obj.sintomas = Array.from(document.querySelectorAll('.active-icon')).map(b => b.dataset.nome);
        localStorage.setItem('LunaBia-' + data, JSON.stringify(obj));
        alert("Bo guardou seus dados! 🌿");
    }

    function carregarDados() {
        const data = document.getElementById('data-input').value;
        const salvo = JSON.parse(localStorage.getItem('LunaBia-' + data) || '{"escalas":{}, "sintomas":[]}');
        document.querySelectorAll('[data-escala]').forEach(g => {
            g.querySelectorAll('button').forEach(b => {
                b.classList.remove('active');
                if(b.innerText == salvo.escalas[g.dataset.escala]) b.classList.add('active');
            });
        });
        document.querySelectorAll('.active-icon').forEach(b => b.classList.remove('active-icon'));
        if(salvo.sintomas) salvo.sintomas.forEach(s => {
            const btn = Array.from(document.querySelectorAll('#grid-sintomas-icons button')).find(b => b.dataset.nome == s);
            if(btn) btn.classList.add('active-icon');
        });
    }

    let chartObj = null;

    function abrirRelatorio() {
        const mesAno = document.getElementById('data-input').value.substring(0, 7);
        let soma = {Sono:0, Humor:0, Energia:0, Descanso:0}, conta = 0, sintCount = {}, luaImpacto = {Cheia:[], Minguante:[], Nova:[], Crescente:[]};

        for (let i = 0; i < localStorage.length; i++) {
            const chave = localStorage.key(i);
            if (chave.includes(mesAno)) {
                const d = JSON.parse(localStorage.getItem(chave));
                conta++;
                for(let k in soma) soma[k] += parseInt(d.escalas[k] || 0);
                if(d.sintomas) d.sintomas.forEach(s => sintCount[s] = (sintCount[s] || 0) + 1);
                if(d.lua) luaImpacto[d.lua].push(parseInt(d.escalas.Humor || 0));
            }
        }

        const medias = Object.values(soma).map(v => conta > 0 ? v/conta : 0);
        document.getElementById('modal-relatorio').style.display = 'block';

        if(chartObj) chartObj.destroy();
        chartObj = new Chart(document.getElementById('chartBarras'), {
            type: 'bar',
            data: {
                labels: ['Sono', 'Humor', 'Energia', 'Descanso'],
                datasets: [{ data: medias, backgroundColor: '#5a7569', borderRadius: 10 }]
            },
            options: { scales: { y: { max: 5 } }, plugins: { legend: { display: false } } }
        });

        const topSint = Object.entries(sintCount).sort((a,b) => b[1]-a[1]).slice(0,3);
        document.getElementById('lista-sintomas').innerHTML = topSint.map(s => `• <b>${s[0]}</b>: ${s[1]}x no mês`).join('<br>') || "Nenhum sintoma recorrente.";

        // ANÁLISE DO BO
        let analise = "Bia, notei que ";
        let piorLua = ""; let minHumor = 5;
        for(let lua in luaImpacto) {
            if(luaImpacto[lua].length > 0) {
                let mediaLua = luaImpacto[lua].reduce((a,b)=>a+b)/luaImpacto[lua].length;
                if(mediaLua < minHumor) { minHumor = mediaLua; piorLua = lua; }
            }
        }
        
        analise += piorLua ? `na <b>Lua ${piorLua}</b> seu humor e energia tendem a baixar um pouco. ` : "ainda estou coletando dados da lua. ";
        if(sintCount['Estresse'] > 3) analise += "O estresse apareceu bastante, tente descansar mais na fase Crescente. ";
        if(medias[0] < 3) analise += "Sua média de sono está baixa, o que reflete diretamente na sua rinite e desânimo.";

        document.getElementById('analise-bo').innerHTML = analise;
    }

    function fecharRelatorio() { document.getElementById('modal-relatorio').style.display = 'none'; }
    document.getElementById('data-input').value = new Date().toISOString().split('T')[0];
    carregarDados();
</script>
</body>
</html>
