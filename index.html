
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LunaBia</title>
    <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@1,6..96,700&family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --gold-active: linear-gradient(135deg, #f7e7ce, #d4af37);
            --text-dark: #5c3b2e;
            --glass-claro: rgba(255, 255, 255, 0.015);
        }

        body {
            margin: 0; min-height: 100vh; font-family: 'Montserrat', sans-serif;
            background-image: url('papeldeparede.png'); 
            background-size: cover;
            background-position: center; 
            background-attachment: fixed;
            display: flex; justify-content: center; padding: 30px 15px; box-sizing: border-box;
            color: var(--text-dark);
        }

        /* ILHA MÃE - CRISTAL LÍQUIDO COM PROFUNDIDADE */
        .container {
            background: var(--glass-claro);
            backdrop-filter: blur(35px) saturate(180%);
            -webkit-backdrop-filter: blur(35px) saturate(180%);
            width: 100%; max-width: 450px; border-radius: 60px; padding: 45px 15px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-top: 2px solid rgba(255, 255, 255, 0.7);
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        h1 { 
            font-family: 'Bodoni Moda', serif; font-style: italic;
            color: #7a422d; font-size: 58px; margin: 0 0 10px 0;
            text-shadow: 2px 2px 20px rgba(255,255,255,0.4);
        }

        /* ILHA DA LUA REALISTA */
        .moon-island {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 35px; padding: 20px;
            margin-bottom: 35px; border: 1px solid rgba(255, 255, 255, 0.2);
            display: flex; flex-direction: column; align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .moon-render {
            width: 75px; height: 75px; border-radius: 50%;
            background: #d1d1d1;
            box-shadow: inset -12px -12px 25px rgba(0,0,0,0.2), 0 0 25px rgba(255,255,255,0.4);
            background-image: 
                radial-gradient(circle at 25% 35%, #b5b5b5 12%, transparent 14%),
                radial-gradient(circle at 65% 25%, #b5b5b5 9%, transparent 11%),
                radial-gradient(circle at 45% 75%, #b5b5b5 14%, transparent 16%),
                radial-gradient(circle at 85% 55%, #b5b5b5 7%, transparent 9%);
            margin-bottom: 12px;
        }
        .moon-label { font-size: 10px; letter-spacing: 3px; text-transform: uppercase; opacity: 0.7; font-weight: 700; }

        /* ILHAS FILHAS - EFEITO GLASS E DESPRENDIDAS */
        .card {
            background: rgba(255, 255, 255, 0.03); 
            border-radius: 30px; padding: 22px;
            margin-bottom: 35px; 
            border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(12px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.12);
        }

        h3 { color: var(--text-dark); text-transform: uppercase; font-size: 9px; margin-bottom: 15px; letter-spacing: 3px; font-weight: 700; opacity: 0.6; }

        /* BOTÕES COM EFEITO VIDRO */
        .btn-opt, .btn-rect {
            background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.3);
            cursor: pointer; color: var(--text-dark); font-weight: 600; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.06);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .btn-opt { border-radius: 50%; width: 40px; height: 40px; font-size: 11px; }
        .btn-rect { border-radius: 18px; padding: 14px; font-size: 10px; text-transform: uppercase; letter-spacing: 1px; }

        /* CLIQUE DOURADO CHAMPAGNE */
        .active { 
            background: var(--gold-active) !important; color: #5c3b2e !important; 
            border: none; transform: scale(1.1) translateY(-4px);
            box-shadow: 0 12px 25px rgba(212, 175, 55, 0.4);
        }

        textarea, input[type="date"] {
            width: 100%; box-sizing: border-box; background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 20px; padding: 16px;
            color: var(--text-dark); font-family: inherit; font-size: 14px; outline: none;
        }

        .action-row { display: flex; gap: 15px; margin-top: 20px; }
        .btn-action { flex: 1; padding: 22px; border-radius: 30px; border: none; color: white; font-weight: 700; cursor: pointer; text-transform: uppercase; box-shadow: 0 15px 30px rgba(0,0,0,0.15); }
        .btn-save { background: linear-gradient(135deg, #b87355, #804832); }
        .btn-report { background: linear-gradient(135deg, #a8c1a9, #7a9d7e); color: #1a261b; }

        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(25px); z-index: 9999; padding: 20px; box-sizing: border-box; overflow-y: auto; }
        .modal-body { background: #fffcfb; border-radius: 50px; padding: 40px 25px; max-width: 450px; margin: auto; }
    </style>
</head>
<body>

<div class="container">
    <h1>LunaBia</h1>

    <div class="moon-island">
        <div class="moon-render"></div>
        <div class="moon-label">Quarto Minguante</div>
    </div>

    <div class="card">
        <h3>📅 Data do Registro</h3>
        <input type="date" id="data-input" onchange="carregarData()">
    </div>

    <div class="card">
        <h3>📖 Leitura Bíblica</h3>
        <div id="grid-biblia" style="display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px;"></div>
    </div>

    <div class="card">
        <h3>✨ Versículo do Dia</h3>
        <textarea id="v-input" rows="2" placeholder="O que o Senhor falou hoje?"></textarea>
    </div>

    <div id="escalas-area"></div>

    <div class="card" id="card-ciclo">
        <h3>🩸 Ciclo Menstrual</h3>
        <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px;">
            <button class="btn-rect" onclick="singleChoice(this)">Leve</button>
            <button class="btn-rect" onclick="singleChoice(this)">Moderado</button>
            <button class="btn-rect" onclick="singleChoice(this)">Intenso</button>
        </div>
    </div>

    <div class="card" id="card-sintomas">
        <h3>🤒 Sintomas</h3>
        <div style="display: flex; flex-wrap: wrap; gap: 10px; justify-content: center;">
            <button class="btn-rect" onclick="this.classList.toggle('active')">Cólica</button>
            <button class="btn-rect" onclick="this.classList.toggle('active')">Inchaço</button>
            <button class="btn-rect" onclick="this.classList.toggle('active')">Dor nas costas</button>
            <button class="btn-rect" onclick="this.classList.toggle('active')">Está tudo bem</button>
            <button class="btn-rect" onclick="this.classList.toggle('active')">Dor de cabeça</button>
            <button class="btn-rect" onclick="this.classList.toggle('active')">Insônia</button>
        </div>
    </div>

    <div class="card">
        <h3>✍️ Meu Diário</h3>
        <textarea id="d-input" rows="4" placeholder="Abra seu coração..."></textarea>
    </div>

    <div class="action-row">
        <button class="btn-action btn-save" onclick="salvar()">SALVAR</button>
        <button class="btn-action btn-report" onclick="abrirRelatorio()">RELATÓRIO</button>
    </div>
</div>

<div id="modal"><div class="modal-body" id="modal-content"></div></div>

<script>
    // Gerar Dias
    const grid = document.getElementById('grid-biblia');
    for(let i=1; i<=31; i++) {
        const b = document.createElement('button'); b.className = 'btn-opt'; b.innerText = i;
        b.onclick = () => b.classList.toggle('active'); grid.appendChild(b);
    }

    // Gerar Escalas
    const nomes = ["Sono", "Humor", "Cansaço", "Descanso", "Energia"];
    const area = document.getElementById('escalas-area');
    nomes.forEach(n => {
        const c = document.createElement('div'); c.className = 'card'; c.innerHTML = `<h3>${n}</h3>`;
        const g = document.createElement('div'); g.style = "display:grid; grid-template-columns:repeat(5,1fr); gap:10px;";
        for(let i=1; i<=5; i++) {
            const b = document.createElement('button'); b.className = 'btn-opt s-btn'; b.innerText = i; b.dataset.cat = n;
            b.onclick = function() { g.querySelectorAll('.btn-opt').forEach(x => x.classList.remove('active')); this.classList.add('active'); };
            g.appendChild(b);
        }
        c.appendChild(g); area.appendChild(c);
    });

    function singleChoice(btn) {
        btn.parentElement.querySelectorAll('.btn-rect').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    // MEMÓRIA POR DATA
    function salvar() {
        const d = document.getElementById('data-input').value;
        const entry = {
            biblia: Array.from(document.querySelectorAll('#grid-biblia .active')).map(b => b.innerText),
            versiculo: document.getElementById('v-input').value,
            escalas: {},
            ciclo: document.querySelector('#card-ciclo .active')?.innerText || "",
            sintomas: Array.from(document.querySelectorAll('#card-sintomas .active')).map(b => b.innerText),
            diario: document.getElementById('d-input').value
        };
        document.querySelectorAll('.s-btn.active').forEach(b => entry.escalas[b.dataset.cat] = b.innerText);
        let db = JSON.parse(localStorage.getItem('lunabia_vfinal_db') || "{}");
        db[d] = entry;
        localStorage.setItem('lunabia_vfinal_db', JSON.stringify(db));
        alert("LunaBia: Salvo com luz e carinho! 🙏");
    }

    function carregarData() {
        const d = document.getElementById('data-input').value;
        const db = JSON.parse(localStorage.getItem('lunabia_vfinal_db') || "{}");
        const log = db[d];
        document.querySelectorAll('.active').forEach(b => b.classList.remove('active'));
        document.getElementById('v-input').value = ""; document.getElementById('d-input').value = "";
        if(log) {
            document.getElementById('v-input').value = log.versiculo;
            document.getElementById('d-input').value = log.diario;
            log.biblia.forEach(n => Array.from(document.querySelectorAll('#grid-biblia .btn-opt')).find(x => x.innerText == n)?.classList.add('active'));
            Object.keys(log.escalas).forEach(k => Array.from(document.querySelectorAll(`.s-btn[data-cat="${k}"]`)).find(x => x.innerText == log.escalas[k])?.classList.add('active'));
            if(log.ciclo) Array.from(document.querySelectorAll('#card-ciclo .btn-rect')).find(x => x.innerText == log.ciclo)?.classList.add('active');
            log.sintomas.forEach(s => Array.from(document.querySelectorAll('#card-sintomas .btn-rect')).find(x => x.innerText == s)?.classList.add('active'));
        }
    }

    function abrirRelatorio() {
        const db = JSON.parse(localStorage.getItem('lunabia_vfinal_db') || "{}");
        const cont = document.getElementById('modal-content');
        const datas = Object.keys(db).sort().reverse();
        let h = `<h2 style="font-family:'Bodoni Moda'; font-style:italic; color:#804832; font-size:40px;">Análise Inteligente</h2>`;
        if(datas.length > 0) {
            datas.forEach(dt => {
                const item = db[dt];
                h += `<div style="border-bottom:1px solid #eee; padding:15px 0; text-align:left; font-size:12px;"><b>📅 ${dt}</b> | 🩸 Ciclo: ${item.ciclo || '-'}<br>✨ Versículo: ${item.versiculo.substring(0,30)}...</div>`;
            });
        } else { h += "<p>Ainda não há registros, Bia.</p>"; }
        h += `<button onclick="document.getElementById('modal').style.display='none'" class="btn-action btn-save" style="margin-top:20px; width:100%;">VOLTAR</button>`;
        cont.innerHTML = h; document.getElementById('modal').style.display = 'block';
    }

    document.getElementById('data-input').valueAsDate = new Date();
    carregarData();
</script>
</body>
</html>
